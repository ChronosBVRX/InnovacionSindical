<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Planilla - Carlos Guerrero</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1b365d;
            --secondary-teal: #4b9b9b;
            --bg-light: #f4f6f8;
            --text-dark: #222222;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- 1. PANTALLA DE INICIO (PREGUNTA) --- */
        #config-screen {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            margin-top: 10vh;
            max-width: 400px;
            width: 90%;
        }

        .logo-circle-mask {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 15px;
            border: 3px solid var(--primary-blue);
            display: flex; align-items: center; justify-content: center; background: white;
        }
        .logo-circle-mask img { width: 140%; height: auto; object-fit: cover; }

        #config-screen h2 { color: var(--primary-blue); margin-top: 0; font-weight: 800; }
        .input-group { margin: 20px 0; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        
        .btn-primary { 
            background-color: var(--secondary-teal); color: white; border: none; 
            padding: 15px 30px; font-size: 16px; font-weight: 700; border-radius: 5px; 
            cursor: pointer; width: 100%; text-transform: uppercase; transition: background 0.3s;
        }
        .btn-primary:hover { background-color: #3a8b95; }

        /* --- 2. PANTALLA DE EDICIÓN --- */
        #editor-screen { display: none; width: 100%; flex-direction: column; align-items: center; }
        
        .toolbar { 
            width: 100%; background-color: var(--primary-blue); padding: 15px 0; 
            text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        .toolbar button { 
            background-color: white; color: var(--primary-blue); border: none; 
            padding: 10px 15px; font-weight: 700; border-radius: 5px; cursor: pointer; margin: 0 5px; 
        }

        .preview-wrapper { width: 100%; display: flex; justify-content: center; padding: 20px 10px; box-sizing: border-box; }
        
        /* HOJA PRINCIPAL */
        .planilla-hoja {
            width: 100%;
            max-width: 1100px;
            background-color: white;
            box-sizing: border-box;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- CABECERA --- */
        .header { text-align: center; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        .header-logo-container { margin-bottom: 10px; }
        .header h1 { color: var(--primary-blue); font-size: 36px; margin: 0; text-transform: uppercase; font-weight: 800; letter-spacing: -1px; }
        .header h2 { color: var(--secondary-teal); font-size: 20px; margin: 5px 0 0; text-transform: uppercase; font-weight: 700; }

        /* --- REPRESENTANTE --- */
        .rep-section { display: flex; justify-content: center; margin-bottom: 30px; padding-left: 60px; }
        
        .representative-banner {
            background-color: var(--primary-blue);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            padding: 15px 30px 15px 80px;
            border-radius: 12px;
            position: relative;
        }

        /* Foto circular que sobresale a la izquierda */
        .photo-placeholder-rep {
            width: 120px; height: 120px;
            background-color: #e0e0e0;
            border-radius: 50%;
            border: 6px solid white;
            position: absolute; left: -60px; top: 50%; transform: translateY(-50%);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            cursor: pointer; background-size: cover; background-position: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .photo-placeholder-rep svg { width: 60%; fill: #777; }

        /* Mini logo pegado a la foto */
        .mini-logo-overlap {
            position: absolute; bottom: 0; right: -5px; width: 35px; height: 35px;
            background: white; border-radius: 50%; border: 2px solid white;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .mini-logo-overlap img { width: 140%; height: auto; }

        .rep-text { display: flex; flex-direction: column; text-align: left; }
        .rep-title { font-size: 14px; font-weight: 600; color: #d8e2ea; }
        .rep-name { font-size: 28px; font-weight: 800; text-transform: uppercase; }

        .rep-logo-right .logo-circle-mask { width: 50px; height: 50px; margin: 0; border: 2px solid white; }

        /* --- CUADRÍCULA INTEGRANTES --- */
        .members-grid {
            display: grid;
            gap: 15px;
            flex-grow: 1;
        }

        .member-card {
            background-color: white;
            border: 2px solid var(--primary-blue);
            border-radius: 10px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
        }

        .member-photo {
            width: 60px; height: 60px;
            background-color: #f0f0f0; border-radius: 8px; margin-right: 15px;
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            overflow: hidden; cursor: pointer; background-size: cover; background-position: center;
        }
        .member-photo svg { width: 70%; fill: #888; transform: translateY(5px); }

        .member-info { flex-grow: 1; display: flex; flex-direction: column; }
        .member-info span[contenteditable] { outline: none; border-bottom: 1px dashed transparent; padding: 1px 0; }
        .member-info span[contenteditable]:focus { border-bottom: 1px dashed var(--secondary-teal); }
        
        .member-name { font-weight: 800; font-size: 14px; color: var(--primary-blue); text-transform: uppercase; margin-bottom: 2px; }
        .member-role { font-weight: 700; color: var(--primary-blue); font-size: 12px; text-transform: uppercase; }
        .member-unit { font-weight: 600; color: var(--secondary-teal); font-size: 11px; text-transform: uppercase; }

        /* --- PIE DE PÁGINA --- */
        .footer-banner {
            background-color: var(--secondary-teal);
            color: white; padding: 20px; margin-top: 30px;
            text-align: center; border-radius: 10px; position: relative;
            display: flex; flex-direction: column; justify-content: center;
        }
        .footer-banner h3 { font-size: 24px; margin: 0; font-weight: 800; text-transform: uppercase; }
        .footer-banner p { font-size: 18px; margin: 5px 0 0; font-weight: 600; text-transform: uppercase; }

        /* --- MÓVIL (Vista para editar cómodamente) --- */
        @media (max-width: 768px) {
            .members-grid { grid-template-columns: 1fr !important; }
            .rep-section { padding-left: 0; flex-direction: column; }
            .representative-banner { flex-direction: column; padding: 70px 20px 20px 20px; text-align: center; }
            .photo-placeholder-rep { left: 50%; top: 0; transform: translate(-50%, -50%); border-width: 4px; }
            .rep-text { align-items: center; margin-bottom: 15px; }
            .rep-logo-right { display: none; }
        }

        /* ==================================================================== */
        /* --- IMPRESIÓN PDF (ESTRICTAMENTE 1 HOJA CARTA ACOSTADA) --- */
        /* ==================================================================== */
        @media print {
            @page {
                size: letter landscape; /* FUERZA TAMAÑO CARTA ACOSTADO */
                margin: 0; /* SIN MÁRGENES DEL NAVEGADOR */
            }
            body, html { margin: 0; padding: 0; background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            
            #config-screen, .toolbar { display: none !important; }
            #editor-screen { display: block; padding: 0; height: 100vh; overflow: hidden; }
            .preview-wrapper { padding: 0; display: block; }
            
            /* LA HOJA ESTÁ BLOQUEADA A LAS DIMENSIONES EXACTAS */
            .planilla-hoja {
                width: 11in !important;
                height: 8.5in !important;
                max-width: none; border-radius: 0; box-shadow: none;
                padding: 0.3in 0.4in !important; margin: 0 !important;
                display: flex; flex-direction: column; justify-content: space-between;
                overflow: hidden !important; /* IMPOSIBLE CREAR SEGUNDA PÁGINA */
            }

            /* Cabecera optimizada para no robar espacio vertical */
            .header { flex-direction: row; justify-content: center; align-items: center; gap: 20px; margin-bottom: 10px; }
            .header-logo-container { margin-bottom: 0; }
            .header-logo-container .logo-circle-mask { width: 60px; height: 60px; }
            .header h1 { font-size: 26pt; line-height: 1; }
            .header h2 { font-size: 14pt; margin-top: 4px; }
            
            /* Representante proporcionado */
            .rep-section { margin-bottom: 10px; padding-left: 0; display: flex; justify-content: center; }
            .representative-banner { width: 85%; padding: 8px 20px 8px 60px; border-radius: 10px; }
            .photo-placeholder-rep { width: 85px; height: 85px; left: -40px; border-width: 4px; }
            .rep-name { font-size: 18pt; }
            .rep-title { font-size: 9pt; }
            .rep-logo-right { display: flex !important; }
            .rep-logo-right .logo-circle-mask { width: 40px; height: 40px; }

            /* Tarjetas de Integrantes reducidas inteligentemente */
            .members-grid { gap: 6px; align-content: start; margin-bottom: 10px; }
            .member-card { padding: 4px 8px; border-width: 1.5px; border-radius: 6px; }
            .member-photo { width: 35px; height: 35px; margin-right: 8px; border-radius: 6px; }
            
            /* Tamaño de texto dinámico en las tarjetas */
            .member-name { font-size: 9pt; margin-bottom: 1px; }
            .member-role { font-size: 8pt; }
            .member-unit { font-size: 7.5pt; }

            /* Footer optimizado */
            .footer-banner { margin-top: 0; padding: 8px 20px; border-radius: 8px; }
            .footer-banner h3 { font-size: 16pt; }
            .footer-banner p { font-size: 12pt; margin-top: 2px; }
        }
    </style>
</head>
<body>

    <div id="config-screen">
        <div class="logo-circle-mask">
            <img src="https://raw.githubusercontent.com/ChronosBVRX/InnovacionSindical/main/Logo%20SNTSS.jpeg" alt="Logo CG">
        </div>
        <h2>Armar Planilla</h2>
        <p>Al guardar en PDF, el diseño se forzará automáticamente a <b>1 sola hoja Carta Acostada</b> conservando el formato profesional.</p>
        
        <div class="input-group">
            <label for="num-integrantes">Cantidad de Integrantes (Sin contar líder):</label>
            <input type="number" id="num-integrantes" min="1" max="30" value="18">
        </div>

        <button class="btn-primary" onclick="iniciarPlanilla()">Empezar a Editar</button>
    </div>

    <div id="editor-screen">
        <div class="toolbar">
            <button onclick="location.reload()">← Nueva</button>
            <button onclick="window.print()">Guardar PDF (1 Hoja Acostada)</button>
        </div>

        <div class="preview-wrapper">
            <div class="planilla-hoja" id="hoja-maestra">
                
                <div class="header">
                    <div class="header-logo-container">
                        <div class="logo-circle-mask">
                            <img src="https://raw.githubusercontent.com/ChronosBVRX/InnovacionSindical/main/Logo%20SNTSS.jpeg" alt="Logo CG">
                        </div>
                    </div>
                    <div style="text-align: center;">
                        <h1 contenteditable>PLANILLA CONGRESIONAL</h1>
                        <h2 contenteditable>CONGRESO SECCIONAL ORDINARIO</h2>
                    </div>
                </div>

                <div class="rep-section">
                    <div class="representative-banner">
                        
                        <div class="photo-placeholder-rep" id="rep-photo" onclick="triggerFileUpload('rep-file-input')">
                            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                            <div class="mini-logo-overlap">
                                <img src="https://raw.githubusercontent.com/ChronosBVRX/InnovacionSindical/main/Logo%20SNTSS.jpeg" alt="CG">
                            </div>
                        </div>
                        <input type="file" id="rep-file-input" accept="image/*" style="display: none;" onchange="handleFileUpload(this, 'rep-photo')">
                        
                        <div class="rep-text">
                            <span class="rep-title" contenteditable>REPRESENTANTE DE PLANILLA:</span>
                            <span class="rep-name" contenteditable>CARLOS GUERRERO</span>
                        </div>

                        <div class="rep-logo-right">
                            <div class="logo-circle-mask">
                                <img src="https://raw.githubusercontent.com/ChronosBVRX/InnovacionSindical/main/Logo%20SNTSS.jpeg" alt="Logo CG">
                            </div>
                        </div>

                    </div>
                </div>

                <div class="members-grid" id="members-grid">
                    </div>

                <div class="footer-banner">
                    <h3 contenteditable>¡UNIDOS SOMOS FUERZA!</h3>
                    <p contenteditable>VOTA POR LA PLANILLA "UNIÓN Y PROGRESO"</p>
                </div>

            </div>
        </div>
    </div>

    <script>
        function iniciarPlanilla() {
            const numIntegrantes = document.getElementById('num-integrantes').value;
            
            if(numIntegrantes < 1) {
                alert("Ingresa al menos 1 integrante.");
                return;
            }

            document.getElementById('config-screen').style.display = 'none';
            document.getElementById('editor-screen').style.display = 'flex';

            generarCuadricula(numIntegrantes);
        }

        function generarCuadricula(cantidad) {
            const grid = document.getElementById('members-grid');
            grid.innerHTML = ''; 
            
            // LA MAGIA DE LAS COLUMNAS: Dependiendo del número, crea más columnas para que nunca baje de 1 hoja.
            let cols = 3;
            if (cantidad <= 6) cols = 3; // 2 filas
            else if (cantidad > 6 && cantidad <= 12) cols = 4; // 3 filas
            else if (cantidad > 12 && cantidad <= 18) cols = 6; // 3 filas
            else if (cantidad > 18) cols = 7; // Ajuste extremo
            
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            const silhouette = `<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;

            for (let i = 1; i <= cantidad; i++) {
                const card = document.createElement('div');
                card.className = 'member-card';
                
                const photoId = `member-photo-${i}`;
                const fileInputId = `member-file-input-${i}`;

                card.innerHTML = `
                    <div class="member-photo" id="${photoId}" onclick="triggerFileUpload('${fileInputId}')">
                        ${silhouette}
                    </div>
                    <input type="file" id="${fileInputId}" accept="image/*" style="display: none;" onchange="handleFileUpload(this, '${photoId}')">
                    <div class="member-info">
                        <span class="member-name" contenteditable>NOMBRE INTEGRANTE</span>
                        <span class="member-role" contenteditable>CARGO / VOCAL ${i}</span>
                        <span class="member-unit" contenteditable>UNIDAD A</span>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function triggerFileUpload(inputId) {
            document.getElementById(inputId).click();
        }

        function handleFileUpload(input, photoContainerId) {
            const file = input.files[0];
            const container = document.getElementById(photoContainerId);
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    container.style.backgroundImage = `url('${e.target.result}')`;
                    const svg = container.querySelector('svg');
                    if(svg) svg.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
