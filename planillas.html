<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Planillas </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* --- ESTILOS DEL FORMULARIO Y LA INTERFAZ --- */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { color: #122c4d; text-align: center; }
        
        .form-group {
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }

        .form-group h3 { margin-top: 0; color: #4b929b; }

        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }

        input[type="text"], input[type="number"], input[type="file"] {
            width: 100%; padding: 10px; margin-bottom: 10px;
            border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;
        }

        .btn {
            background-color: #122c4d; color: white; padding: 12px 20px;
            border: none; border-radius: 5px; cursor: pointer;
            font-size: 16px; font-weight: bold; width: 100%; transition: background 0.3s;
        }
        .btn:hover { background-color: #0a1a2e; }
        .btn-print { background-color: #4b929b; margin-top: 10px; }
        .btn-print:hover { background-color: #3a727a; }
        .btn-back { background-color: #6c757d; margin-top: 10px; }

        #integrantes-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .integrante-card-form {
            background: white; padding: 15px; border: 1px solid #ccc; border-radius: 5px;
        }

        /* --- ESTILOS DEL PÓSTER (TABLOIDE) --- */
        #poster-preview { display: none; margin-top: 20px; text-align: center;}
        #poster-section {
            width: 11in; height: 17in; background-color: #f6f8f9; margin: 0 auto;
            position: relative; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.2);
            visibility: visible;
        }

        :root { --dark-blue: #122c4d; --teal: #4b929b; }

        /* --- ENCABEZADO Y LOGOS --- */
        .p-header { text-align: center; padding-top: 0.8in; padding-bottom: 0.2in; }
        
        .p-logo-container {
            display: inline-flex; flex-direction: column; align-items: center; margin-bottom: 0.1in;
        }

        .p-logo-circular {
            width: 2.2in; height: 2.2in; border-radius: 50%; object-fit: contain; 
            border: 0.05in solid var(--dark-blue); background-color: white; 
            margin: 0; padding: 0.1in; 
        }

        .p-header h1 { color: var(--dark-blue); font-size: 0.55in; font-weight: 900; margin-top: 0.1in; margin-bottom: 0.05in; text-transform: uppercase; }
        .p-header h2 { color: var(--teal); font-size: 0.35in; text-transform: uppercase; margin: 0; }

        .p-representante {
            background-color: var(--dark-blue); color: white; width: 8.5in; height: 1.5in;
            margin: 0.1in auto 0.3in auto; border-radius: 100px; display: flex; align-items: center; position: relative;
        }
        .p-rep-photo {
            width: 2.2in; height: 2.2in; background-color: #ccc; border-radius: 50%; 
            border: 0.08in solid var(--dark-blue); position: absolute; left: -0.5in; object-fit: cover;
        }
        .p-rep-info { margin-left: 2in; }
        .p-rep-title { font-size: 0.22in; font-weight: bold; }
        .p-rep-name { font-size: 0.45in; font-weight: 900; text-transform: uppercase; }
        
        .p-logo-sec {
            position: absolute; right: 0.5in; width: 1.2in; height: 1.2in; border-radius: 50%;
            object-fit: contain; border: 0.03in solid white; background-color: white; padding: 0.05in;
        }

        /* --- CUADRÍCULA DINÁMICA CON INTEGRANTES --- */
        .p-grid { 
            display: grid; padding: 0 0.5in; margin-top: 0.1in; flex-grow: 1; 
            /* Esta línea corrige que las filas se estiren demasiado y se corten los de abajo */
            align-content: start; 
        }
        .p-card { background: white; display: flex; align-items: center; box-sizing: border-box; }
        .p-card-photo { background-color: #ccc; object-fit: cover; }
        .p-card-info { display: flex; flex-direction: column; justify-content: center; }
        .p-card-name { color: var(--dark-blue); font-weight: bold; text-transform: uppercase; line-height: 1.1; }
        .p-card-role { color: #333; text-transform: uppercase; }
        .p-card-unit { color: var(--teal); font-weight: bold; text-transform: uppercase; }

        /* TAMAÑOS */
        .p-grid { grid-template-columns: repeat(3, 1fr); gap: 0.25in; }
        .p-grid .p-card { height: 1.6in; padding: 0.15in; border: 0.04in solid var(--dark-blue); border-radius: 15px; }
        .p-grid .p-card-photo { width: 1.1in; height: 1.3in; margin-right: 0.15in; border-radius: 8px; }
        .p-grid .p-card-name { font-size: 0.2in; margin-bottom: 0.05in; }
        .p-grid .p-card-role { font-size: 0.18in; margin-bottom: 0.03in; }
        .p-grid .p-card-unit { font-size: 0.18in; }

        .p-grid.size-md { gap: 0.15in; padding: 0 0.5in; }
        .p-grid.size-md .p-card { height: 1.25in; padding: 0.1in; border-radius: 12px; }
        .p-grid.size-md .p-card-photo { width: 0.9in; height: 1.05in; margin-right: 0.12in; }
        .p-grid.size-md .p-card-name { font-size: 0.16in; margin-bottom: 0.03in; }
        .p-grid.size-md .p-card-role, .p-grid.size-md .p-card-unit { font-size: 0.14in; }

        .p-grid.size-sm { grid-template-columns: repeat(4, 1fr); gap: 0.12in; padding: 0 0.3in; }
        .p-grid.size-sm .p-card { height: 1.1in; padding: 0.08in; border: 0.03in solid var(--dark-blue); border-radius: 10px; }
        .p-grid.size-sm .p-card-photo { width: 0.75in; height: 0.94in; margin-right: 0.08in; border-radius: 6px; }
        .p-grid.size-sm .p-card-name { font-size: 0.13in; margin-bottom: 0.02in; }
        .p-grid.size-sm .p-card-role, .p-grid.size-sm .p-card-unit { font-size: 0.11in; }

        .p-grid.size-xs { grid-template-columns: repeat(5, 1fr); gap: 0.1in; padding: 0 0.2in; }
        .p-grid.size-xs .p-card { height: 0.9in; padding: 0.06in; border: 0.02in solid var(--dark-blue); border-radius: 8px; }
        .p-grid.size-xs .p-card-photo { width: 0.6in; height: 0.78in; margin-right: 0.06in; border-radius: 4px; }
        .p-grid.size-xs .p-card-name { font-size: 0.11in; margin-bottom: 0.02in; }
        .p-grid.size-xs .p-card-role, .p-grid.size-xs .p-card-unit { font-size: 0.09in; }

        /* --- PIE DE PÁGINA --- */
        .p-footer {
            background-color: var(--teal); color: white; text-align: center;
            padding: 0.4in 0; position: absolute; bottom: 0; width: 100%; z-index: 10;
        }
        .p-footer h3 { font-size: 0.4in; margin: 0 0 0.1in 0; text-transform: uppercase; }
        .p-footer h4 { font-size: 0.35in; margin: 0; font-weight: normal; text-transform: uppercase; }

        .p-line { position: absolute; background-color: var(--teal); height: 0.04in; }
        .p-line-1 { top: 3.5in; left: 0; width: 1.5in; }
        .p-line-2 { top: 1.5in; right: 0; width: 2in; }
    </style>
</head>
<body>

    <div class="app-container" id="form-section">
        <h1>Generador de Planillas - Alta Resolución</h1>
        
        <div class="form-group">
            <h3>Representante</h3>
            <label>Nombre del Representante de Planilla:</label>
            <input type="text" id="nombreRep" value="Carlos Guerrero">
            <label>Foto del Representante:</label>
            <input type="file" id="fotoRep" accept="image/*">
        </div>

        <div class="form-group">
            <h3>Integrantes a Congresistas</h3>
            <label>¿Cuántos integrantes son?</label>
            <input type="number" id="numIntegrantes" min="1" max="36" value="18" onchange="generarCamposIntegrantes()">
            <div id="integrantes-container"></div>
        </div>

        <button class="btn" onclick="generarPoster()">Generar Plantilla</button>
    </div>

    <div id="poster-preview">
        <div style="text-align: center; margin-bottom: 20px;">
            <button class="btn btn-print" onclick="descargarComoImagen()" style="width: auto; padding: 10px 40px; margin-right: 10px;">📥 Descargar como Imagen</button>
            <button class="btn btn-back" onclick="volverEditar()" style="width: auto; padding: 10px 40px;">✏️ Volver a Editar</button>
        </div>

        <div id="poster-section">
            <div class="p-line p-line-1"></div>
            <div class="p-line p-line-2"></div>

            <div class="p-header">
                <div class="p-logo-container">
                    <img src="https://raw.githubusercontent.com/ChronosBVRX/InnovacionSindical/main/Logo%20SNTSS.jpeg" alt="Logo SNTSS" class="p-logo-circular" crossorigin="anonymous">
                </div>
                <h1>PLANILLA AZUL</h1>
                <h2>XXXI Congreso Seccional Ordinario</h2>
            </div>

            <div class="p-representante">
                <img src="data:image/gif;base64,R0lGODlhAQABAIAAAMLCwgAAACH5BAAAAAAALAAAAAABAAEAAAICRAEAOw==" id="render-foto-rep" class="p-rep-photo">
                <div class="p-rep-info">
                    <div class="p-rep-title">REPRESENTANTE DE PLANILLA:</div>
                    <div class="p-rep-name" id="render-nombre-rep">CARLOS GUERRERO</div>
                </div>
                <img src="https://raw.githubusercontent.com/ChronosBVRX/InnovacionSindical/main/Logo%20SNTSS.jpeg" class="p-logo-sec" crossorigin="anonymous">
            </div>

            <div class="p-grid" id="render-grid"></div>

            <div class="p-footer">
                <h3>¡Únete a nuestra visión!</h3>
                <h4>VOTA POR LA PLANILLA AZUL</h4>
                <h3>"UNIDOS SOMOS FUERZA"</h3>

            </div>
        </div>
    </div>

    <script>
        const pixelGris = "data:image/gif;base64,R0lGODlhAQABAIAAAMLCwgAAACH5BAAAAAAALAAAAAABAAEAAAICRAEAOw==";

        function generarCamposIntegrantes() {
            const container = document.getElementById('integrantes-container');
            const num = document.getElementById('numIntegrantes').value;
            container.innerHTML = ''; 

            for (let i = 1; i <= num; i++) {
                container.innerHTML += `
                    <div class="integrante-card-form">
                        <label>Integrante ${i}</label>
                        <input type="text" id="nombreInt${i}" placeholder="Nombre Completo" required>
                        <input type="text" id="cargoInt${i}" placeholder="Categoría / Cargo">
                        <input type="text" id="unidadInt${i}" placeholder="Adscripción">
                        <label style="font-size:12px; font-weight:normal;">Foto Integrante ${i}:</label>
                        <input type="file" id="fotoInt${i}" accept="image/*">
                    </div>
                `;
            }
        }

        generarCamposIntegrantes();

        function generarPoster() {
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('poster-preview').style.display = 'block';

            document.getElementById('render-nombre-rep').innerText = document.getElementById('nombreRep').value;

            const fotoRepInput = document.getElementById('fotoRep');
            if(fotoRepInput.files && fotoRepInput.files[0]) {
                document.getElementById('render-foto-rep').src = URL.createObjectURL(fotoRepInput.files[0]);
            } else {
                // Si no suben foto del representante, se mantiene gris
                document.getElementById('render-foto-rep').src = pixelGris;
            }

            const num = parseInt(document.getElementById('numIntegrantes').value);
            const grid = document.getElementById('render-grid');
            grid.innerHTML = ''; 
            
            grid.className = 'p-grid';
            if (num >= 10 && num <= 15) {
                grid.classList.add('size-md');
            } else if (num >= 16 && num <= 24) {
                grid.classList.add('size-sm');
            } else if (num >= 25) {
                grid.classList.add('size-xs');
            }

            for (let i = 1; i <= num; i++) {
                let nombre = document.getElementById(`nombreInt${i}`).value || 'NOMBRE DEL INTEGRANTE';
                let cargo = document.getElementById(`cargoInt${i}`).value || 'CARGO';
                let unidad = document.getElementById(`unidadInt${i}`).value || 'UNIDAD';
                
                let fotoInput = document.getElementById(`fotoInt${i}`);
                let fotoSrc = pixelGris; 
                if(fotoInput.files && fotoInput.files[0]) {
                    fotoSrc = URL.createObjectURL(fotoInput.files[0]);
                }

                grid.innerHTML += `
                    <div class="p-card">
                        <img src="${fotoSrc}" class="p-card-photo">
                        <div class="p-card-info">
                            <div class="p-card-name">${nombre}</div>
                            <div class="p-card-role">${cargo}</div>
                            <div class="p-card-unit">${unidad}</div>
                        </div>
                    </div>
                `;
            }
        }

        function volverEditar() {
            document.getElementById('form-section').style.display = 'block';
            document.getElementById('poster-preview').style.display = 'none';
        }

        function descargarComoImagen() {
            const poster = document.getElementById('poster-section');
            const options = {
                scale: 3, // Escala de 3x para evitar desbordes de memoria en móviles pero mantener gran calidad
                useCORS: true, // Esto obliga a la herramienta a pedir permiso para usar las imágenes de Github
                allowTaint: true,
                backgroundColor: '#f6f8f9', 
                width: poster.offsetWidth,
                height: poster.offsetHeight,
                onclone: (clonedDoc) => {
                    clonedDoc.getElementById('poster-section').style.display = 'flex';
                }
            };

            // Agregamos un texto de "Cargando..." al botón para que sepas que está procesando
            const btn = document.querySelector('.btn-print');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = '⏳ Procesando imagen...';
            btn.disabled = true;

            html2canvas(poster, options).then(canvas => {
                const image = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.href = image;
                link.download = 'planilla_congresional_alta_resolucion.png';
                link.click();
                
                // Restauramos el botón
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
            }).catch(err => {
                alert("Hubo un error al generar la imagen. Intenta de nuevo.");
                console.error(err);
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
