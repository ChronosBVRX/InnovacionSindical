<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plataforma Sindical Digital - Comité</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --bg: #1b2e45;
      --panel: #2e4f77;
      --panel2: #395f8d;
      --txt: #f0fdfa;
      --muted: #bce9eb;
      --primary: #4da1a8;
      --primary-hover: #3b8289;
      --danger: #d9534f;
      --danger-hover: #c9302c;
      --ok: #45d39f;
      --ring: rgba(77, 161, 168, .35);
      --shadow: 0 10px 25px rgba(0, 0, 0, .2);
      --shadow-hover: 0 15px 35px rgba(0, 0, 0, .4);
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--txt);
      line-height: 1.5;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .topbar {
      display: flex;
      gap: 16px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .title-group {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 2.2rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .title i {
      color: var(--primary);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    button:active { transform: scale(0.95); }

    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); box-shadow: 0 4px 12px rgba(77, 161, 168, 0.4); }

    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: var(--danger-hover); box-shadow: 0 4px 12px rgba(217, 83, 79, 0.4); }

    .btn-muted { background: #ffffff14; color: var(--txt); border: 1px solid #ffffff24; }
    .btn-muted:hover { background: #ffffff24; }

    .status {
      padding: 10px 14px;
      background: #ffffff10;
      border: 1px solid #ffffff20;
      border-radius: 12px;
      color: var(--muted);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--ok);
      color: #062b1f;
      font-weight: 800;
      font-size: 0.9rem;
      padding: 6px 12px;
      border-radius: 999px;
      box-shadow: 0 2px 10px rgba(69, 211, 159, 0.3);
    }

    .main-category-group {
      margin-bottom: 56px;
      animation: fadeInUp 0.6s ease backwards;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .main-category-title {
      font-size: 2rem;
      font-weight: 800;
      color: var(--txt);
      margin-top: 0;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 3px solid var(--primary);
      display: flex;
      align-items: center;
      gap: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .card {
      background: var(--panel);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid #ffffff14;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
      border-color: #ffffff30;
    }

    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
      background: #17304f;
      transition: transform 0.3s ease;
      
      /* --- PROTECCIÓN DE IMAGEN --- */
      pointer-events: none; /* Hace que la imagen sea "invisible" al clic del mouse */
      user-select: none; /* Evita que la seleccionen como texto */
      -webkit-user-drag: none; /* Evita que la arrastren al escritorio en Chrome/Safari */
    }

    .card:hover img {
      transform: scale(1.05);
    }

    .card-body {
      padding: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 2;
      background: var(--panel);
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 1.3rem;
      color: var(--txt);
    }

    .meta {
      font-size: 0.95rem;
      color: var(--muted);
      margin: 6px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .meta i {
      width: 16px;
      text-align: center;
      color: var(--primary);
    }
    
    .cargo-badge {
      display: inline-block;
      background: rgba(77, 161, 168, 0.2);
      color: #e0f2f1;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 10px;
      border: 1px solid rgba(77, 161, 168, 0.4);
      align-self: flex-start;
    }

    /* Estilos para la descripción y el botón de acordeón */
    .desc-container {
      margin-top: auto;
      display: flex;
      flex-direction: column;
    }

    .desc-text {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #ffffff10;
      font-size: 0.9rem;
      color: #eefefe;
    }

    .btn-toggle-desc {
      display: none; /* Oculto en PC por defecto */
      background: rgba(255, 255, 255, 0.05);
      color: var(--primary);
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      margin-top: 12px;
      font-size: 0.85rem;
      cursor: pointer;
      justify-content: center;
    }

    .btn-toggle-desc:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .card-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .card-actions button {
      flex: 1;
      justify-content: center;
    }

    .hidden { display: none !important; }

    .panel {
      margin: 0 0 40px 0;
      background: var(--panel2);
      border-radius: 18px;
      padding: 24px;
      border: 1px solid #ffffff1c;
      box-shadow: var(--shadow);
      animation: fadeInUp 0.5s ease;
    }

    .panel h2 {
      margin-top: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    input, textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #ffffff24;
      background: #ffffff10;
      color: var(--txt);
      padding: 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input:focus, textarea:focus {
      border-color: var(--primary);
      background: #ffffff1a;
      box-shadow: 0 0 0 3px var(--ring);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      grid-column: 1 / -1;
      font-family: inherit;
    }

    .form-actions {
      grid-column: 1 / -1;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .message {
      margin: 16px 0 0;
      color: var(--muted);
      font-weight: 600;
    }

    .notice {
      margin: 0 0 24px;
      padding: 14px 18px;
      border-radius: 14px;
      background: #ffffff10;
      border: 1px solid #ffffff22;
      color: var(--txt);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeInUp 0.4s ease;
    }

    .error {
      background: rgba(217, 83, 79, .15);
      border: 1px solid rgba(217, 83, 79, .4);
      color: #ffd9d8;
    }

    .okbox {
      background: rgba(69, 211, 159, .15);
      border: 1px solid rgba(69, 211, 159, .4);
      color: #dffcef;
    }

    /* --- Ajustes para vista de celular (Grid de 2 columnas y Acordeón) --- */
    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .card img {
        height: 140px;
      }

      .card-body {
        padding: 12px;
      }

      .card h3 {
        font-size: 1.05rem;
        margin-bottom: 8px;
      }

      .cargo-badge {
        font-size: 0.75rem;
        padding: 3px 8px;
      }

      .meta {
        font-size: 0.8rem;
      }

      .card-actions {
        flex-direction: column;
        gap: 8px;
      }
      
      .main-category-title {
        font-size: 1.4rem;
        margin-bottom: 16px;
      }

      /* Lógica visual del acordeón en móvil */
      .desc-text {
        display: none; /* Oculto por defecto en celular */
      }
      
      .desc-text.show {
        display: block; /* Se muestra al hacer clic */
        animation: fadeInUp 0.3s ease;
      }

      .btn-toggle-desc {
        display: flex; /* Muestra el botón solo en celular */
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="debugBox" class="notice"><i class="fa-solid fa-spinner fa-spin"></i> Cargando plataforma sindical...</div>

    <div class="topbar">
      <div class="title-group">
        <button id="btnBack" class="btn-muted"><i class="fa-solid fa-arrow-left"></i> Volver</button>
        
        <div class="title">
          <i class="fa-solid fa-sitemap"></i> Estructura del Comité
          <span id="adminBadge" class="admin-badge hidden"><i class="fa-solid fa-shield-halved"></i> Admin</span>
        </div>
      </div>

      <div class="actions">
        <div id="userStatus" class="status"><i class="fa-solid fa-user-xmark"></i> No has iniciado sesión</div>
        <button id="btnLogin" class="btn-primary"><i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión</button>
        <button id="btnLogout" class="btn-muted hidden"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</button>
      </div>
    </div>

    <section id="adminPanel" class="panel hidden">
      <h2><i class="fa-solid fa-user-pen"></i> Administrar Integrante</h2>

      <form id="memberForm">
        <input type="hidden" id="memberId" />
        <input id="nombre" type="text" placeholder="Nombre completo" required />
        <input id="cartera" type="text" placeholder="Cartera (Ej. Secretaría General, Comisión de Deportes)" required />
        <input id="area" type="text" placeholder="Cargo en la cartera (Ej. Titular, Auxiliar)" />
        <input id="categoria" type="text" placeholder="Categoría Laboral (Ej. Médico, Administrativo)" />
        <input id="unidad" type="text" placeholder="Unidad de adscripción" />
        
        <input id="foto" type="url" placeholder="Pega aquí el enlace de Google Drive (Ej. https://drive.google.com/file/...)" style="grid-column: 1 / -1;" />

        <textarea id="descripcion" placeholder="Descripción o reseña del integrante"></textarea>

        <div class="form-actions">
          <button type="submit" id="btnSubmitForm" class="btn-primary"><i class="fa-solid fa-floppy-disk"></i> Guardar integrante</button>
          <button type="button" id="btnCancelEdit" class="btn-muted"><i class="fa-solid fa-xmark"></i> Cancelar</button>
        </div>
      </form>

      <div id="formMessage" class="message"></div>
    </section>

    <div id="comiteContainer"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://axsncdwshdvsysrpikwj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4c25jZHdzaGR2c3lzcnBpa3dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAyMjkwMjQsImV4cCI6MjA3NTgwNTAyNH0.oapcH219puVjaR2DcG7dX51uhwVn530L1hhz8ASv7qs';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const debugBox = document.getElementById('debugBox');
    const comiteContainer = document.getElementById('comiteContainer');
    const adminPanel = document.getElementById('adminPanel');
    const adminBadge = document.getElementById('adminBadge');
    const userStatus = document.getElementById('userStatus');
    const btnLogin = document.getElementById('btnLogin');
    const btnLogout = document.getElementById('btnLogout');
    const memberForm = document.getElementById('memberForm');
    const btnCancelEdit = document.getElementById('btnCancelEdit');
    const formMessage = document.getElementById('formMessage');
    const btnSubmitForm = document.getElementById('btnSubmitForm');
    const btnBack = document.getElementById('btnBack');

    const memberId = document.getElementById('memberId');
    const nombre = document.getElementById('nombre');
    const cartera = document.getElementById('cartera');
    const area = document.getElementById('area');
    const categoria = document.getElementById('categoria');
    const unidad = document.getElementById('unidad');
    const foto = document.getElementById('foto');
    const descripcion = document.getElementById('descripcion');

    let currentUser = null;
    let isAdmin = false;

    btnBack.addEventListener('click', () => { window.history.back(); });

    // Delegación de eventos para el acordeón de "Ver detalles" en móviles
    document.addEventListener('click', (e) => {
      const btnToggle = e.target.closest('.btn-toggle-desc');
      if (btnToggle) {
        const descText = btnToggle.previousElementSibling;
        if (descText && descText.classList.contains('desc-text')) {
          descText.classList.toggle('show');
          if (descText.classList.contains('show')) {
            btnToggle.innerHTML = '<i class="fa-solid fa-chevron-up"></i> Ocultar detalles';
          } else {
            btnToggle.innerHTML = '<i class="fa-solid fa-chevron-down"></i> Ver detalles';
          }
        }
      }
    });

    function setDebug(message, type = 'normal', icon = 'fa-info-circle') {
      debugBox.innerHTML = `<i class="fa-solid ${icon}"></i> ${message}`;
      debugBox.className = 'notice';
      if (type === 'error') debugBox.classList.add('error');
      if (type === 'ok') debugBox.classList.add('okbox');
    }

    async function getCurrentUser() {
      const { data, error } = await supabase.auth.getUser();
      if (error) return null;
      return data.user;
    }

    async function checkIfAdmin() {
      const user = await getCurrentUser();
      if (!user) return false;

      const { data, error } = await supabase
        .from('admins_comite')
        .select('user_id')
        .eq('user_id', user.id)
        .maybeSingle();

      if (error) return false;
      return !!data;
    }

    function obtenerUrlDirectaDrive(url) {
      if (!url) return '';
      if (url.includes('drive.google.com')) {
        const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (match && match[1]) {
          return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1000`;
        }
      }
      return url;
    }

    async function loadComite() {
      setDebug('Sincronizando estructura...', 'normal', 'fa-spinner fa-spin');
      const { data, error } = await supabase.from('comite').select('*').order('id', { ascending: true });

      if (error) {
        setDebug('Error de conexión: ' + error.message, 'error', 'fa-triangle-exclamation');
        comiteContainer.innerHTML = '<div class="notice error"><i class="fa-solid fa-circle-exclamation"></i> No se pudo cargar la estructura.</div>';
        return;
      }

      if (!data || data.length === 0) {
        setDebug('Sin registros en la base de datos.', 'ok', 'fa-check');
      } else {
        setDebug('Estructura cargada correctamente.', 'ok', 'fa-cloud-arrow-down');
        setTimeout(() => debugBox.classList.add('hidden'), 3000); 
      }
      renderComite(data || []);
    }

    function renderComite(items) {
      if (!items.length) {
        comiteContainer.innerHTML = '<div class="notice"><i class="fa-solid fa-folder-open"></i> El organigrama está vacío.</div>';
        return;
      }

      // Agrupación por cartera (Secretarías, Comisiones, Subcomisiones)
      const grupos = {
        'Secretarías': [],
        'Comisiones': [],
        'Subcomisiones': [],
        'Otras Áreas': []
      };

      items.forEach(item => {
        const carteraTexto = (item.cartera || '').toLowerCase();
        if (carteraTexto.includes('subcomisi')) {
          grupos['Subcomisiones'].push(item);
        } else if (carteraTexto.includes('comisi')) {
          grupos['Comisiones'].push(item);
        } else if (carteraTexto.includes('secretar')) {
          grupos['Secretarías'].push(item);
        } else {
          grupos['Otras Áreas'].push(item);
        }
      });

      let html = '';
      let animDelay = 0;

      for (const [nombreBloque, miembros] of Object.entries(grupos)) {
        if (miembros.length === 0) continue; 

        html += `
          <div class="main-category-group" style="animation-delay: ${animDelay}s">
            <h1 class="main-category-title"><i class="fa-solid fa-layer-group"></i> ${escapeHtml(nombreBloque)}</h1>
            <div class="grid">
        `;
        
        animDelay += 0.1;

        html += miembros.map(item => {
          const fotoDirecta = obtenerUrlDirectaDrive(item.foto);

          return `
          <article class="card">
            <img src="${escapeHtmlAttr(fotoDirecta)}" alt="${escapeHtmlAttr(item.nombre || 'Sin nombre')}"
                 onerror="this.src='https://placehold.co/600x400/17304f/f0fdfa?text=Sin+foto'">
            <div class="card-body">
              ${item.area ? `<div class="cargo-badge"><i class="fa-solid fa-id-badge"></i> ${escapeHtml(item.area)}</div>` : ''}
              <h3>${escapeHtml(item.nombre || '')}</h3>
              <div class="meta"><i class="fa-solid fa-briefcase"></i> <span><strong>Cartera:</strong> ${escapeHtml(item.cartera || '-')}</span></div>
              <div class="meta"><i class="fa-solid fa-user-tag"></i> <span><strong>Categoría:</strong> ${escapeHtml(item.categoria || '-')}</span></div>
              <div class="meta"><i class="fa-solid fa-location-dot"></i> <span><strong>Unidad:</strong> ${escapeHtml(item.unidad || '-')}</span></div>
              
              ${(item.descripcion || item.desc) ? `
                <div class="desc-container">
                  <div class="desc-text">${escapeHtml(item.descripcion || item.desc)}</div>
                  <button class="btn-toggle-desc"><i class="fa-solid fa-chevron-down"></i> Ver detalles</button>
                </div>
              ` : ''}

              ${isAdmin ? `
                <div class="card-actions">
                  <button class="btn-primary" data-edit='${escapeHtmlAttr(JSON.stringify(item))}'><i class="fa-solid fa-pen-to-square"></i> Editar</button>
                  <button class="btn-danger" data-delete="${item.id}"><i class="fa-solid fa-trash-can"></i> Eliminar</button>
                </div>
              ` : ''}
            </div>
          </article>
        `}).join('');
        html += `</div></div>`;
      }
      comiteContainer.innerHTML = html;
      if (isAdmin) bindAdminCardActions();
    }

    function bindAdminCardActions() {
      document.querySelectorAll('[data-edit]').forEach(btn => {
        btn.addEventListener('click', () => {
          const raw = btn.getAttribute('data-edit');
          const item = JSON.parse(unescapeHtmlAttr(raw));
          fillForm(item);
        });
      });

      document.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-delete');
          const ok = confirm('⚠️ ¿Seguro que deseas eliminar este integrante?');
          if (!ok) return;

          const { error } = await supabase.from('comite').delete().eq('id', id);
          if (error) { alert('Error: ' + error.message); return; }
          await loadComite();
        });
      });
    }

    function fillForm(item) {
      memberId.value = item.id || '';
      nombre.value = item.nombre || '';
      cartera.value = item.cartera || '';
      area.value = item.area || '';
      categoria.value = item.categoria || '';
      unidad.value = item.unidad || '';
      foto.value = item.foto || '';
      descripcion.value = item.descripcion || item.desc || '';
      
      formMessage.innerHTML = `<i class="fa-solid fa-pen"></i> Editando registro activo`;
      adminPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function resetForm() {
      memberForm.reset();
      memberId.value = '';
      formMessage.textContent = '';
      btnSubmitForm.disabled = false;
    }

    memberForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      btnSubmitForm.disabled = true;
      formMessage.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Guardando datos...`;

      const payload = {
        nombre: nombre.value.trim(),
        cartera: cartera.value.trim(),
        area: area.value.trim(),
        categoria: categoria.value.trim(),
        unidad: unidad.value.trim(),
        foto: foto.value.trim(),
        descripcion: descripcion.value.trim()
      };

      let result;
      if (memberId.value) {
        result = await supabase.from('comite').update(payload).eq('id', memberId.value);
      } else {
        result = await supabase.from('comite').insert([payload]);
      }

      btnSubmitForm.disabled = false;

      if (result.error) {
        formMessage.innerHTML = `<span style="color:var(--danger)"><i class="fa-solid fa-circle-xmark"></i> ${result.error.message}</span>`;
        return;
      }

      resetForm();
      await loadComite();
      formMessage.innerHTML = `<span style="color:var(--ok)"><i class="fa-solid fa-circle-check"></i> Registro guardado exitosamente.</span>`;
      setTimeout(() => formMessage.textContent = '', 4000);
    });

    btnCancelEdit.addEventListener('click', resetForm);

    btnLogin.addEventListener('click', async () => {
      const email = prompt('Correo electrónico de administrador:');
      if (!email) return;
      const password = prompt('Contraseña:');
      if (!password) return;

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) { alert('Credenciales incorrectas: ' + error.message); return; }
      await refreshUI();
    });

    btnLogout.addEventListener('click', async () => {
      await supabase.auth.signOut();
      await refreshUI();
    });

    async function refreshUI() {
      currentUser = await getCurrentUser();
      isAdmin = await checkIfAdmin();

      if (currentUser) {
        userStatus.innerHTML = `<i class="fa-solid fa-user-check"></i> ${currentUser.email}`;
        btnLogin.classList.add('hidden');
        btnLogout.classList.remove('hidden');
      } else {
        userStatus.innerHTML = `<i class="fa-solid fa-user-xmark"></i> Sesión no iniciada`;
        btnLogin.classList.remove('hidden');
        btnLogout.classList.add('hidden');
      }

      if (isAdmin) {
        adminPanel.classList.remove('hidden');
        adminBadge.classList.remove('hidden');
      } else {
        adminPanel.classList.add('hidden');
        adminBadge.classList.add('hidden');
        resetForm();
      }
      await loadComite();
    }

    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' || event === 'SIGNED_OUT') {
        refreshUI();
      }
    });

    function escapeHtml(str) {
      if (!str) return '';
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return String(str).replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    function escapeHtmlAttr(str) {
      return escapeHtml(str);
    }

    function unescapeHtmlAttr(str) {
      if (!str) return '';
      const map = { '&amp;': '&', '&lt;': '<', '&gt;': '>', '&quot;': '"', '&#039;': "'" };
      return String(str).replace(/&amp;|&lt;|&gt;|&quot;|&#039;/g, function(m) { return map[m]; });
    }

    // --- BLOQUEAR CLIC DERECHO EN LAS TARJETAS ---
    document.addEventListener('contextmenu', (e) => {
      if (e.target.closest('.card')) {
        e.preventDefault();
      }
    });

    await refreshUI();
  </script>
</body>
</html>
