<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comité</title>
  <style>
    :root{
      --bg:#1b2e45;
      --panel:#2e4f77;
      --panel2:#395f8d;
      --txt:#f0fdfa;
      --muted:#bce9eb;
      --primary:#4da1a8;
      --danger:#d9534f;
      --ok:#45d39f;
      --ring:rgba(77,161,168,.35);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:var(--bg);
      color:var(--txt);
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px;
    }

    .topbar{
      display:flex;
      gap:12px;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:24px;
    }

    .title{
      font-size:2rem;
      font-weight:800;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    button{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:700;
    }

    .btn-primary{ background:var(--primary); color:white; }
    .btn-danger{ background:var(--danger); color:white; }
    .btn-muted{ background:#ffffff14; color:var(--txt); border:1px solid #ffffff24; }

    .status{
      padding:10px 14px;
      background:#ffffff10;
      border:1px solid #ffffff20;
      border-radius:12px;
      color:var(--muted);
    }

    .admin-badge{
      display:inline-block;
      background:var(--ok);
      color:#062b1f;
      font-weight:800;
      padding:6px 10px;
      border-radius:999px;
      margin-left:8px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:18px;
    }

    .card{
      background:var(--panel);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 10px 25px rgba(0,0,0,.2);
      border:1px solid #ffffff14;
    }

    .card img{
      width:100%;
      height:260px;
      object-fit:cover;
      display:block;
      background:#17304f;
    }

    .card-body{
      padding:16px;
    }

    .card h3{
      margin:0 0 8px;
      font-size:1.2rem;
    }

    .meta{
      font-size:.95rem;
      color:var(--muted);
      margin:4px 0;
    }

    .desc{
      margin-top:10px;
      line-height:1.45;
      color:#eefefe;
    }

    .card-actions{
      display:flex;
      gap:8px;
      margin-top:14px;
    }

    .hidden{ display:none !important; }

    .panel{
      margin:24px 0;
      background:var(--panel2);
      border-radius:18px;
      padding:18px;
      border:1px solid #ffffff1c;
    }

    .panel h2{
      margin-top:0;
    }

    form{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:12px;
    }

    input, textarea{
      width:100%;
      border-radius:12px;
      border:1px solid #ffffff24;
      background:#ffffff10;
      color:var(--txt);
      padding:12px;
      outline:none;
    }

    textarea{
      min-height:120px;
      resize:vertical;
      grid-column:1/-1;
    }

    .form-actions{
      grid-column:1/-1;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .message{
      margin:12px 0 0;
      color:var(--muted);
      font-weight:600;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title">
          Comité
          <span id="adminBadge" class="admin-badge hidden">Admin</span>
        </div>
      </div>

      <div class="actions">
        <div id="userStatus" class="status">No has iniciado sesión</div>
        <button id="btnLogin" class="btn-primary">Iniciar sesión</button>
        <button id="btnLogout" class="btn-muted hidden">Cerrar sesión</button>
      </div>
    </div>

    <section id="adminPanel" class="panel hidden">
      <h2>Administrar comité</h2>

      <form id="memberForm">
        <input type="hidden" id="memberId" />

        <input id="nombre" type="text" placeholder="Nombre" required />
        <input id="cartera" type="text" placeholder="Cartera" />
        <input id="area" type="text" placeholder="Área" />
        <input id="categoria" type="text" placeholder="Categoría" />
        <input id="unidad" type="text" placeholder="Unidad" />
        <input id="foto" type="url" placeholder="URL de la foto" />
        <textarea id="descripcion" placeholder="Descripción"></textarea>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Guardar</button>
          <button type="button" id="btnCancelEdit" class="btn-muted">Cancelar</button>
        </div>
      </form>

      <div id="formMessage" class="message"></div>
    </section>

    <div id="comiteGrid" class="grid"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'TU_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'TU_SUPABASE_ANON_KEY';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const comiteGrid = document.getElementById('comiteGrid');
    const adminPanel = document.getElementById('adminPanel');
    const adminBadge = document.getElementById('adminBadge');
    const userStatus = document.getElementById('userStatus');
    const btnLogin = document.getElementById('btnLogin');
    const btnLogout = document.getElementById('btnLogout');
    const memberForm = document.getElementById('memberForm');
    const btnCancelEdit = document.getElementById('btnCancelEdit');
    const formMessage = document.getElementById('formMessage');

    const memberId = document.getElementById('memberId');
    const nombre = document.getElementById('nombre');
    const cartera = document.getElementById('cartera');
    const area = document.getElementById('area');
    const categoria = document.getElementById('categoria');
    const unidad = document.getElementById('unidad');
    const foto = document.getElementById('foto');
    const descripcion = document.getElementById('descripcion');

    let currentUser = null;
    let isAdmin = false;

    async function getCurrentUser() {
      const { data, error } = await supabase.auth.getUser();
      if (error) {
        console.error('Error getUser:', error.message);
        return null;
      }
      return data.user;
    }

    async function checkIfAdmin() {
      const user = await getCurrentUser();
      if (!user) return false;

      const { data, error } = await supabase
        .from('admins_comite')
        .select('user_id')
        .eq('user_id', user.id)
        .maybeSingle();

      if (error) {
        console.error('Error verificando admin:', error.message);
        return false;
      }

      return !!data;
    }

    async function loadComite() {
      const { data, error } = await supabase
        .from('comite')
        .select('*')
        .order('id', { ascending: true });

      if (error) {
        console.error('Error cargando comité:', error.message);
        comiteGrid.innerHTML = '<p>No se pudo cargar el comité.</p>';
        return;
      }

      renderComite(data || []);
    }

    function renderComite(items) {
      if (!items.length) {
        comiteGrid.innerHTML = '<p>No hay integrantes capturados.</p>';
        return;
      }

      comiteGrid.innerHTML = items.map(item => `
        <article class="card">
          <img src="${escapeHtml(item.foto || '')}" alt="${escapeHtml(item.nombre || 'Sin nombre')}"
               onerror="this.src='https://placehold.co/600x400?text=Sin+foto'">
          <div class="card-body">
            <h3>${escapeHtml(item.nombre || '')}</h3>
            <div class="meta"><strong>Cartera:</strong> ${escapeHtml(item.cartera || '-')}</div>
            <div class="meta"><strong>Área:</strong> ${escapeHtml(item.area || '-')}</div>
            <div class="meta"><strong>Categoría:</strong> ${escapeHtml(item.categoria || '-')}</div>
            <div class="meta"><strong>Unidad:</strong> ${escapeHtml(item.unidad || '-')}</div>
            <div class="desc">${escapeHtml(item.descripcion || '')}</div>

            ${isAdmin ? `
              <div class="card-actions">
                <button class="btn-primary" data-edit='${JSON.stringify(item).replace(/'/g, "&apos;")}'>Editar</button>
                <button class="btn-danger" data-delete="${item.id}">Eliminar</button>
              </div>
            ` : ''}
          </div>
        </article>
      `).join('');

      if (isAdmin) {
        bindAdminCardActions();
      }
    }

    function bindAdminCardActions() {
      document.querySelectorAll('[data-edit]').forEach(btn => {
        btn.addEventListener('click', () => {
          const raw = btn.getAttribute('data-edit').replace(/&apos;/g, "'");
          const item = JSON.parse(raw);
          fillForm(item);
        });
      });

      document.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-delete');
          const ok = confirm('¿Seguro que deseas eliminar este integrante?');
          if (!ok) return;

          const { error } = await supabase
            .from('comite')
            .delete()
            .eq('id', id);

          if (error) {
            alert('No se pudo eliminar: ' + error.message);
            return;
          }

          await loadComite();
        });
      });
    }

    function fillForm(item) {
      memberId.value = item.id || '';
      nombre.value = item.nombre || '';
      cartera.value = item.cartera || '';
      area.value = item.area || '';
      categoria.value = item.categoria || '';
      unidad.value = item.unidad || '';
      foto.value = item.foto || '';
      descripcion.value = item.descripcion || '';
      formMessage.textContent = 'Editando registro #' + item.id;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
      memberForm.reset();
      memberId.value = '';
      formMessage.textContent = '';
    }

    memberForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const payload = {
        nombre: nombre.value.trim(),
        cartera: cartera.value.trim(),
        area: area.value.trim(),
        categoria: categoria.value.trim(),
        unidad: unidad.value.trim(),
        foto: foto.value.trim(),
        descripcion: descripcion.value.trim()
      };

      let error;

      if (memberId.value) {
        const res = await supabase
          .from('comite')
          .update(payload)
          .eq('id', memberId.value);

        error = res.error;
      } else {
        const res = await supabase
          .from('comite')
          .insert([payload]);

        error = res.error;
      }

      if (error) {
        formMessage.textContent = 'Error: ' + error.message;
        return;
      }

      resetForm();
      await loadComite();
      formMessage.textContent = 'Guardado correctamente.';
    });

    btnCancelEdit.addEventListener('click', resetForm);

    btnLogin.addEventListener('click', async () => {
      const email = prompt('Correo electrónico:');
      if (!email) return;
      const password = prompt('Contraseña:');
      if (!password) return;

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        alert('Error al iniciar sesión: ' + error.message);
        return;
      }

      await refreshUI();
    });

    btnLogout.addEventListener('click', async () => {
      await supabase.auth.signOut();
      await refreshUI();
    });

    async function refreshUI() {
      currentUser = await getCurrentUser();
      isAdmin = await checkIfAdmin();

      if (currentUser) {
        userStatus.textContent = currentUser.email || 'Sesión iniciada';
        btnLogin.classList.add('hidden');
        btnLogout.classList.remove('hidden');
      } else {
        userStatus.textContent = 'No has iniciado sesión';
        btnLogin.classList.remove('hidden');
        btnLogout.classList.add('hidden');
      }

      if (isAdmin) {
        adminPanel.classList.remove('hidden');
        adminBadge.classList.remove('hidden');
      } else {
        adminPanel.classList.add('hidden');
        adminBadge.classList.add('hidden');
        resetForm();
      }

      await loadComite();
    }

    supabase.auth.onAuthStateChange(async () => {
      await refreshUI();
    });

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    await refreshUI();
  </script>
</body>
</html>
