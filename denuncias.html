<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Asistente Generador de Escritos — Plataforma Sindical CG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-dark: #0f172a;
    --bg-gradient: radial-gradient(circle at top center, #1e293b, #0f172a);
    --panel-bg: rgba(30, 41, 59, 0.7);
    --panel-border: rgba(148, 163, 184, 0.1);
    --primary: #38bdf8;
    --primary-hover: #0ea5e9;
    --accent: #7dd3fc;
    --text-main: #f1f5f9;
    --text-muted: #94a3b8;
    --input-bg: rgba(15, 23, 42, 0.6);
    --input-border: rgba(148, 163, 184, 0.2);
    --focus-ring: rgba(56, 189, 248, 0.5);
    --radius: 12px;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%; margin: 0;
    background: var(--bg-dark);
    background-image: var(--bg-gradient);
    color: var(--text-main);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

  .header-group { margin-bottom: 30px; text-align: center; }
  h1 {
    margin: 10px 0; font-size: 28px; font-weight: 700;
    background: linear-gradient(90deg, #fff, var(--primary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  p.muted { color: var(--text-muted); font-size: 15px; margin-top: 5px; line-height: 1.5; }

  .card {
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(16px);
  }

  form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  label { display: block; font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 8px; }

  input, select, textarea {
    width: 100%; padding: 12px 16px; border-radius: var(--radius);
    border: 1px solid var(--input-border); background: var(--input-bg);
    color: #fff; font-size: 15px; font-family: inherit; transition: all 0.2s ease;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--primary); outline: none; background: rgba(30, 41, 59, 0.9);
  }

  textarea { min-height: 140px; resize: vertical; grid-column: 1/-1; line-height: 1.6; }
  .grid-full { grid-column: 1/-1; }

  .highlight-section {
    grid-column: 1/-1; background: rgba(56, 189, 248, 0.05);
    border: 1px solid rgba(56, 189, 248, 0.15); padding: 20px; border-radius: 16px;
  }

  .btn {
    appearance: none; border: 1px solid var(--panel-border);
    background: rgba(255, 255, 255, 0.05); color: var(--text-main);
    border-radius: 50px; padding: 12px 24px; font-size: 14px;
    cursor: pointer; font-weight: 600; transition: all 0.2s ease;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    text-decoration: none;
  }

  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .btn.primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-hover));
    border: none; color: #0f172a; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
  }

  /* MODAL Y PREVIEW */
  .modal {
    position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98);
    display: none; align-items: center; justify-content: center; z-index: 1000;
  }
  .modal.show { display: flex; }

  .modal-card {
    width: 95vw; height: 95vh; background: #1e293b; border-radius: 20px;
    display: flex; flex-direction: column; overflow: hidden;
  }

  .modal-h {
    padding: 16px; background: #0f172a; display: flex; 
    justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap;
  }

  .modal-b {
    flex: 1; overflow: auto; padding: 40px 20px;
    display: flex; justify-content: center; align-items: flex-start;
    background: #334155;
  }

  .page.carta {
    width: 816px; height: 1056px; background: #fff; color: #111;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5); flex-shrink: 0;
    transform-origin: top center;
  }

  .sheet {
    padding: 72px 64px; font-family: "Times New Roman", Times, serif;
    font-size: 12pt; line-height: 1.5; position: relative; height: 100%;
    color: #000;
  }

  .sheet header { text-align: right; font-weight: bold; margin-bottom: 30px; }
  .sheet .dest { font-weight: bold; text-transform: uppercase; }
  .sheet .cuerpo { text-align: justify; white-space: pre-wrap; margin-top: 20px; }
  .sheet .pie {
    position: absolute; bottom: 80px; left: 64px; right: 64px;
    text-align: center; font-weight: bold;
  }

  #status {
    position: fixed; bottom: 20px; right: 20px; background: #1e293b;
    border-left: 4px solid var(--primary); color: #fff; padding: 12px 20px;
    border-radius: 8px; transform: translateY(100px); transition: 0.3s; z-index: 2000;
  }
  #status.visible { transform: translateY(0); }

  @media (max-width: 768px) {
    form { grid-template-columns: 1fr; }
    .page.carta { transform: scale(0.4); } 
    .modal-h .btn { flex: 1; padding: 8px; font-size: 11px; }
  }

  /* =========================================
     ESTILOS EXCLUSIVOS PARA IMPRESIÓN
     ========================================= */
  @media print {
    /* Ocultamos el formulario de atrás, el menú del modal y las notificaciones */
    .wrap, .modal-h, #status {
      display: none !important;
    }
    
    /* Le quitamos los fondos oscuros y la posición al modal para que la hoja fluya natural */
    body, .modal, .modal-card, .modal-b {
      background: transparent !important;
      position: static !important;
      padding: 0 !important;
      margin: 0 !important;
      box-shadow: none !important;
      display: block !important;
      width: 100% !important;
      height: auto !important;
      overflow: visible !important;
    }

    /* Ajustamos la hoja para que tome todo el espacio en papel y no escale extraño */
    .page.carta {
      width: 100% !important;
      height: auto !important;
      transform: none !important; 
      box-shadow: none !important;
      margin: 0 !important;
    }

    .sheet {
      padding: 2cm !important;
      height: auto !important;
    }

    /* Solucionamos la posición de la firma para documentos largos */
    .sheet .pie {
      position: relative !important;
      bottom: auto !important;
      left: auto !important;
      right: auto !important;
      margin-top: 60px !important;
      page-break-inside: avoid !important;
    }

    @page {
      size: letter;
      margin: 0;
    }
  }
</style>
</head>

<body>
  <div class="wrap">
    <div style="margin-bottom: 20px;">
      <a class="btn" href="https://chronosbvrx.github.io/InnovacionSindical/">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Regresar al menú
      </a>
    </div>

    <div class="header-group">
      <h1>Asistente Generador de Escritos</h1>
      <p class="muted">Redacta oficios profesionales con IA. Universal para PC y Móvil.</p>
    </div>

    <div class="card">
      <form id="fDenuncia">
        <div class="highlight-section">
          <label for="puestoCatalogo">1. ¿A quién va dirigido el escrito?</label>
          <select id="puestoCatalogo" required>
            <option value="">— Selecciona la Secretaría o Comisión —</option>
            <optgroup label="Secretarías">
              <option value="Secretaría General|Dr. Juan Gerardo García González">Secretaría General</option>
              <option value="Secretaría de Interior y Propaganda|M.N.F. Amin Uriel Morales Sánchez">Secretaría de Interior y Propaganda</option>
              <option value="Secretaría de Conflictos|J.G.E. Arturo Ochoa Huacuz">Secretaría de Conflictos</option>
              <option value="Secretaría de Trabajo|E.G. Cándido Mora Alcauter">Secretaría de Trabajo</option>
              <option value="Secretaría del Exterior|M.N.F. Ignacio Agustín Orozco Pérez">Secretaría del Exterior</option>
              <option value="Tesorería|EST. Azucena Herrera Martínez">Tesorería</option>
              <option value="Secretaría de Previsión Social|A.M. Fabiola Farías Ambriz">Secretaría de Previsión Social</option>
              <option value="Secretaría de Igualdad Sustantiva|M.F. Gabriela Durán Negrete">Secretaría de Igualdad Sustantiva</option>
              <option value="Secretaría de Asuntos Técnicos|M.N.F. Horacio Peña Alfaro">Secretaría de Asuntos Técnicos</option>
              <option value="Secretaría de Actas y Acuerdos|M.G. César Augusto Contreras Flores">Secretaría de Actas y Acuerdos</option>
              <option value="Secretaría de Prensa|A.M. Yolanda Morelos Palomares">Secretaría de Prensa</option>
              <option value="Secretaría de Puestos Periféricos|M.N.F. Alejandra Johnson Aguirre">Secretaría de Puestos Periféricos</option>
              <option value="Secretaría de Admisión y Cambios|C.C. Uriel Tapia Pérez">Secretaría de Admisión y Cambios</option>
              <option value="Secretaría de Capacitación y Adiestramiento|O.P. América Hilda Reyes Reyes">Secretaría de Capacitación y Adiestramiento</option>
              <option value="Secretaría de Calidad y Modernización|Q.C. Gerardo Ordaz Salazar">Secretaría de Calidad y Modernización</option>
              <option value="Secretaría de Acción Social|E.E. Claudia Denisse Torres Rangel">Secretaría de Acción Social</option>
            </optgroup>
            <optgroup label="Comisiones">
              <option value="Comisión de Honor y Justicia — Presidencia|J.G.S.T. José Francisco Ruiz Domínguez">Honor y Justicia — Presidencia</option>
              <option value="Comisión de Vigilancia — Presidencia|T.R. Eduardo Bolaños Vázquez">Vigilancia — Presidencia</option>
              <option value="Comisión de Fomento a la Seguridad Social — Presidencia|M.N.F. Carlos Mojica Rodríguez">Fomento a la Seg. Social — Presidencia</option>
              <option value="Comisión de Hacienda — Presidencia|A.L. Ángeles Alejandra Ledesma Torres">Hacienda — Presidencia</option>
              <option value="Comisión de Deportes — Presidencia|J.G.P. Roberto Carlos Reyes Ortiz">Deportes — Presidencia</option>
              <option value="Comisión de Acción Política — Presidencia|M.N.F. Verónica Diosdado Minguela">Acción Política — Presidencia</option>
            </optgroup>
            <optgroup label="Subcomisiones Mixtas">
              <option value="Subcomisión Mixta de Becas — Representación Sindical|M.F. Jorge Héctor Zaragoza Palacios">Becas</option>
              <option value="Subcomisión Mixta de Bolsa de Trabajo — Representación Sindical|C.C. M. Guadalupe Calderón Ayala">Bolsa de Trabajo</option>
              <option value="Subcomisión Mixta de Puestos de Confianza 'B' — Representación Sindical|M.F. Jorge Hugo Ruiz Saenz">Puestos de Confianza 'B'</option>
              <option value="Subcomisión Mixta de Capacitación y Adiestramiento — Representación Sindical|A.E.G. Juan Onofre Baez">Capacitación y Adiestramiento</option>
              <option value="Subcomisión Mixta de Seguridad e Higiene — Representación Sindical|A.U.O Betsabe Hernández Flores">Seguridad e Higiene</option>
              <option value="Subcomisión Mixta Disciplinaria — Representación Sindical|Cont. Juan Carlos Servín Juárez">Disciplinaria</option>
              <option value="Subcomisión Mixta de Escalafón — Representación Sindical|E.G. Hilda Ontiveros Cuellar">Escalafón</option>
              <option value="Subcomisión Mixta Paritaria de Protección al Salario — Representación Sindical|E.E. Dinorah Alduenda Guiza">Protección al Salario</option>
              <option value="Subcomisión Mixta de Pasajes — Representación Sindical|O.A. José Antonio Carrillo Bejarano">Pasajes</option>
              <option value="Subcomisión Mixta de Ropa de Trabajo y Uniformes — Representación Sindical|A.A. Julio Cesar García Salgado">Ropa de Trabajo y Uniformes</option>
              <option value="Subcomisión Mixta de Selec. Recursos Humanos para Cambios de Rama — Representación Sindical|C.C. Alicia Martínez Correa">Cambios de Rama</option>
              <option value="Subcomisión Mixta de Tiendas — Representación Sindical|P.E.F.B. Humberto Guerrero Linares">Tiendas</option>
              <option value="Subcomisión Mixta de Jubilaciones y Pensiones — Representación Sindical|E.G.C. Maricela Navarrete Mora">Jubilaciones y Pensiones</option>
              <option value="Subcomisión Mixta de Revisión de Plantillas — Representación Sindical|E.G. Luis Fernando García Cervantes">Revisión de Plantillas</option>
            </optgroup>
          </select>
        </div>

        <input type="hidden" id="cargo">
        <div>
          <label>Nombre del titular (Automático)</label>
          <input id="destinatario" readonly placeholder="Se llena al elegir puesto...">
        </div>
        <div>
          <label>Fecha del escrito</label>
          <input id="fecha" type="date">
        </div>

        <div class="grid-full"><hr style="border:0; border-top:1px solid var(--panel-border);"></div>

        <div>
          <label>Nombre del trabajador</label>
          <input id="nombre" required placeholder="Nombre completo">
        </div>
        <div>
          <label>Matrícula</label>
          <input id="matricula" required placeholder="Ej. 123456" inputmode="numeric">
        </div>
        <div>
          <label>Categoría</label>
          <input id="categoria" required placeholder="Ej. Enfermera General A">
        </div>
        <div>
          <label>Adscripción</label>
          <input id="lugar" placeholder="Ej. HGZ No. XX">
        </div>
        <div class="grid-full">
          <label>Ciudad / Municipio</label>
          <input id="ciudad" placeholder="Ej. Lázaro Cárdenas, Michoacán" required>
        </div>

        <div class="grid-full">
          <label>Descripción de los hechos (La IA redactará formalmente)</label>
          <textarea id="problematica" required placeholder="Explica qué sucedió y qué solicitas..."></textarea>
        </div>

        <div class="grid-full" style="display: flex; gap: 12px; justify-content: flex-end; align-items: center; flex-wrap: wrap;">
          <span style="font-size: 12px; color: var(--text-muted);">Formato Carta garantizado.</span>
          <button type="submit" class="btn primary" id="btnGenerarPrincipal">🚀 Generar Documento</button>
        </div>
      </form>
    </div>
  </div>

  <div id="status"></div>

  <div id="modal" class="modal">
    <div class="modal-card">
      <div class="modal-h">
        <span style="color:white; font-weight:bold;">Vista Previa del Oficio</span>
        <div style="display:flex; gap:8px;">
          <button class="btn" id="btnCopy">📋 Copiar</button>
          <button class="btn" id="btnDownload">⬇️ Descargar PDF</button>
          <button class="btn primary" id="btnPrint">🖨️ Imprimir</button>
          <button class="btn" id="btnClose" style="color:#ef4444; border-color:rgba(239,68,68,0.3);">✖ Cerrar</button>
        </div>
      </div>
      <div class="modal-b" id="modalBody">
        <div id="page" class="page carta">
          <div id="sheet" class="sheet"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const API_BASE = "https://sinos-api.onrender.com";
      const FORM_KEY = 'sinos_denuncias_v1';
      const $ = s => document.querySelector(s);

      const showStatus = (t) => {
        const s = $('#status');
        s.textContent = t;
        s.classList.add('visible');
        setTimeout(() => s.classList.remove('visible'), 4000);
      };

      // Ajuste de escala dinámico para móviles
      const ajustarEscala = () => {
        const modalB = $('#modalBody');
        if (!modalB) return;
        const availableWidth = modalB.clientWidth - 40;
        const sheetWidth = 816;
        const scale = availableWidth < sheetWidth ? availableWidth / sheetWidth : 1;
        const page = $('#page');
        page.style.transform = `scale(${scale})`;
        page.style.marginBottom = availableWidth < sheetWidth ? `-${1056 * (1 - scale)}px` : "0";
      };

      window.addEventListener('resize', ajustarEscala);

      // Cargar/Guardar datos locales
      const saveLocal = () => {
        const d = {
          puesto: $('#puestoCatalogo').value,
          dest: $('#destinatario').value,
          cargo: $('#cargo').value,
          fecha: $('#fecha').value,
          nombre: $('#nombre').value,
          mat: $('#matricula').value,
          cat: $('#categoria').value,
          lug: $('#lugar').value,
          ciu: $('#ciudad').value,
          prob: $('#problematica').value
        };
        localStorage.setItem(FORM_KEY, JSON.stringify(d));
      };

      const loadLocal = () => {
        const raw = localStorage.getItem(FORM_KEY);
        if (!raw) return;
        const d = JSON.parse(raw);
        $('#puestoCatalogo').value = d.puesto || '';
        $('#destinatario').value = d.dest || '';
        $('#cargo').value = d.cargo || '';
        $('#fecha').value = d.fecha || new Date().toISOString().slice(0,10);
        $('#nombre').value = d.nombre || '';
        $('#matricula').value = d.mat || '';
        $('#categoria').value = d.cat || '';
        $('#lugar').value = d.lug || '';
        $('#ciudad').value = d.ciu || '';
        $('#problematica').value = d.prob || '';
      };

      $('#puestoCatalogo').addEventListener('change', (e) => {
        const [cargo, nombre] = e.target.value.split('|');
        $('#cargo').value = cargo || '';
        $('#destinatario').value = nombre || '';
        saveLocal();
      });

      $('form').addEventListener('input', saveLocal);

      async function redactarIA(prob) {
        showStatus("🧠 Redactando escrito formal...");
        try {
          const res = await fetch(`${API_BASE}/escritor`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              tema: "Oficio sindical de hechos o denuncia",
              hechos: [prob],
              extras: "Tono formal, profesional, máximo 3 párrafos, incluye una despedida de respeto.",
              incluirDespedida: true
            })
          });
          const data = await res.json();
          return data.cuerpo || "No se pudo generar el texto.";
        } catch (e) {
          return "Por medio de la presente, expongo ante usted los siguientes hechos: \n\n" + prob;
        }
      }

      const generarContenido = (d, cuerpo) => {
        const fLarga = new Date(d.fecha + 'T12:00:00').toLocaleDateString('es-MX', {day:'2-digit', month:'long', year:'numeric'});
        return `
          <header>${d.ciudad}, a ${fLarga}</header>
          <div class="dest">${d.destinatario}</div>
          <div style="font-weight:bold; margin-bottom:5px;">${d.cargo}</div>
          <div>Presente.</div>
          <div class="cuerpo">${cuerpo}</div>
          <div class="pie">
            ATENTAMENTE<br><br><br><br>
            ${d.nombre}<br>
            Matrícula: ${d.matricula}<br>
            ${d.categoria}<br>
            ${d.lugar}
          </div>
        `;
      };

      $('#btnClose').addEventListener('click', () => $('#modal').classList.remove('show'));

      async function crearPDF(btnElement) {
        showStatus("📄 Generando PDF...");
        
        let originalText = "";
        if (btnElement) {
          originalText = btnElement.innerHTML;
          btnElement.innerHTML = "⏳ Procesando...";
          btnElement.disabled = true;
        }
        
        const pageEl = $('#page');
        const originalTransform = pageEl.style.transform;
        
        pageEl.style.transform = 'scale(1)'; 
        
        try {
          const canvas = await html2canvas(pageEl, {
            scale: 2, 
            useCORS: true,
            backgroundColor: '#ffffff'
          });

          pageEl.style.transform = originalTransform;

          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ unit: 'pt', format: 'letter' });
          
          const imgData = canvas.toDataURL('image/jpeg', 1.0);
          const pdfWidth = doc.internal.pageSize.getWidth();
          const pdfHeight = doc.internal.pageSize.getHeight();
          
          doc.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
          
          const matricula = $('#matricula').value || 'Generado';
          doc.save(`Oficio_${matricula}.pdf`);
          
          showStatus("✅ Descargado.");
        } catch (error) {
          console.error("Error al generar PDF:", error);
          showStatus("❌ Error al generar el PDF.");
          pageEl.style.transform = originalTransform; 
        } finally {
          if (btnElement) {
            btnElement.innerHTML = originalText;
            btnElement.disabled = false;
          }
        }
      }

      $('#btnDownload').addEventListener('click', function() { 
        crearPDF(this); 
      });

      // El botón principal ahora solo redacta y abre el modal
      $('#fDenuncia').addEventListener('submit', async (e) => { 
        e.preventDefault(); 
        
        const btnSubmit = $('#btnGenerarPrincipal');
        const btnText = btnSubmit.innerHTML;
        btnSubmit.innerHTML = "⏳ Generando documento...";
        btnSubmit.disabled = true;

        const d = {
          ciudad: $('#ciudad').value,
          fecha: $('#fecha').value,
          destinatario: $('#destinatario').value,
          cargo: $('#cargo').value,
          nombre: $('#nombre').value,
          matricula: $('#matricula').value,
          categoria: $('#categoria').value,
          lugar: $('#lugar').value
        };
        const cuerpoIA = await redactarIA($('#problematica').value);
        $('#sheet').innerHTML = generarContenido(d, cuerpoIA);

        // Restaurar botón y mostrar modal
        btnSubmit.innerHTML = btnText;
        btnSubmit.disabled = false;

        $('#modal').classList.add('show');
        ajustarEscala();
      });

      $('#btnPrint').addEventListener('click', () => {
        const originalTitle = document.title;
        document.title = "Oficio_Sindical";
        window.print();
        document.title = originalTitle;
      });

      $('#btnCopy').addEventListener('click', () => {
        navigator.clipboard.writeText($('#sheet').innerText);
        showStatus("📋 Copiado al portapapeles.");
      });

      loadLocal();
      if (!$('#fecha').value) $('#fecha').value = new Date().toISOString().slice(0,10);
    });
  </script>
</body>
</html>
