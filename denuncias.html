<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Asistente Generador de Escritos — Plataforma Sindical Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css" />

<style>
  :root {
    --bg-dark: #0f172a;
    --bg-gradient: radial-gradient(circle at top center, #1e293b, #0f172a);
    --panel-bg: rgba(30, 41, 59, 0.7);
    --panel-border: rgba(148, 163, 184, 0.1);
    --primary: #38bdf8;
    --primary-hover: #0ea5e9;
    --accent: #7dd3fc;
    --success: #4ade80;
    --warning: #fbbf24;
    --text-main: #f1f5f9;
    --text-muted: #94a3b8;
    --input-bg: rgba(15, 23, 42, 0.6);
    --input-border: rgba(148, 163, 184, 0.2);
    --radius: 12px;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%; margin: 0;
    background: var(--bg-dark);
    background-image: var(--bg-gradient);
    color: var(--text-main);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

  .header-group { margin-bottom: 30px; text-align: center; }
  h1 {
    margin: 10px 0; font-size: 28px; font-weight: 700;
    background: linear-gradient(90deg, #fff, var(--primary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  p.muted { color: var(--text-muted); font-size: 15px; margin-top: 5px; line-height: 1.5; }

  .profile-alert {
    background: rgba(251, 191, 36, 0.15); border: 1px solid rgba(251, 191, 36, 0.4);
    color: var(--warning); padding: 16px; border-radius: 12px; margin-bottom: 24px;
    display: flex; align-items: center; gap: 12px; font-size: 14px; line-height: 1.5;
  }
  .profile-alert i { font-size: 24px; }
  .profile-alert.hide { display: none !important; }

  .card {
    background: var(--panel-bg); border: 1px solid var(--panel-border);
    border-radius: 24px; padding: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(16px);
  }

  form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 8px; }
  input, select, textarea {
    width: 100%; padding: 12px 16px; border-radius: var(--radius);
    border: 1px solid var(--input-border); background: var(--input-bg);
    color: #fff; font-size: 15px; font-family: inherit; transition: all 0.2s ease;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; background: rgba(30, 41, 59, 0.9); }
  input[readonly] { opacity: 0.7; cursor: not-allowed; }
  textarea { min-height: 140px; resize: vertical; grid-column: 1/-1; line-height: 1.6; }
  .grid-full { grid-column: 1/-1; }

  .highlight-section { grid-column: 1/-1; background: rgba(56, 189, 248, 0.05); border: 1px solid rgba(56, 189, 248, 0.15); padding: 20px; border-radius: 16px; }

  .btn {
    appearance: none; border: 1px solid var(--panel-border);
    background: rgba(255, 255, 255, 0.05); color: var(--text-main);
    border-radius: 50px; padding: 12px 24px; font-size: 14px;
    cursor: pointer; font-weight: 600; transition: all 0.2s ease;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    text-decoration: none;
  }
  .btn:hover { background: rgba(255, 255, 255, 0.1); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn.primary { background: linear-gradient(135deg, var(--primary), var(--primary-hover)); border: none; color: #0f172a; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4); }
  .btn.success { background: linear-gradient(135deg, #22c55e, #16a34a); border: none; color: #fff; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); }

  /* MODALES */
  .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); display: none; align-items: center; justify-content: center; z-index: 1000; }
  .modal.show { display: flex; }
  .modal-card { width: 95vw; height: 95vh; background: #1e293b; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
  .modal-h { padding: 16px; background: #0f172a; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
  .modal-b { flex: 1; overflow: auto; padding: 40px 20px; display: flex; justify-content: center; align-items: flex-start; background: #334155; }

  /* HOJA OFICIO */
  .page.carta { width: 816px; height: 1056px; background: #fff; color: #111; box-shadow: 0 10px 40px rgba(0,0,0,0.5); flex-shrink: 0; transform-origin: top center; }
  .sheet { padding: 72px 64px; font-family: "Times New Roman", Times, serif; font-size: 12pt; line-height: 1.5; position: relative; height: 100%; color: #000; }
  .sheet header { text-align: right; font-weight: bold; margin-bottom: 30px; }
  .sheet .dest { font-weight: bold; text-transform: uppercase; }
  .sheet .cuerpo { text-align: justify; white-space: pre-wrap; margin-top: 20px; }
  .sheet .pie { position: absolute; bottom: 80px; left: 0; right: 0; text-align: center; font-weight: bold; width: 100%; }

  .signature-container { background: #fff; border-radius: 12px; padding: 20px; text-align: center; width: 100%; max-width: 500px; margin: auto; }
  canvas#firmaPad { border: 2px dashed #cbd5e1; border-radius: 8px; background: #f8fafc; cursor: crosshair; touch-action: none; width: 100%; height: 200px; margin-bottom: 16px;}

  #status { position: fixed; bottom: 20px; right: 20px; background: #1e293b; border-left: 4px solid var(--primary); color: #fff; padding: 12px 20px; border-radius: 8px; transform: translateY(100px); transition: 0.3s; z-index: 2000; }
  #status.visible { transform: translateY(0); }

  /* ÁREA DE EVIDENCIA */
  .evidence-section { background: rgba(255, 255, 255, 0.05); border: 2px dashed var(--input-border); padding: 20px; border-radius: 12px; text-align: center; display: none; }
  .evidence-section.active { display: block; }
  #preview-evidencia { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; justify-content: center; }
  .thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid var(--primary); }

  @media (max-width: 768px) {
    form { grid-template-columns: 1fr; }
    .page.carta { transform: scale(0.4); } 
    .modal-h .btn { flex: 1; padding: 8px; font-size: 11px; }
  }

  @media print {
    .wrap, .modal-h, #status, #modal-firma, #alerta-perfil, #modal-validacion { display: none !important; }
    body, #modal, .modal-card, .modal-b { background: transparent !important; position: static !important; padding: 0 !important; margin: 0 !important; box-shadow: none !important; display: block !important; width: 100% !important; height: auto !important; overflow: visible !important; }
    .page.carta { width: 100% !important; height: auto !important; transform: none !important; box-shadow: none !important; margin: 0 !important; }
    .sheet { padding: 2cm !important; height: auto !important; }
    .sheet .pie { position: relative !important; bottom: auto !important; left: 0 !important; right: 0 !important; width: 100% !important; margin-top: 60px !important; page-break-inside: avoid !important; text-align: center !important; }
    @page { size: letter; margin: 0; }
  }
</style>
</head>

<body>
  <div class="wrap" id="mainWrap">
    <div style="margin-bottom: 20px;">
      <a class="btn" href="#" onclick="window.history.back(); return false;">⬅ Regresar</a>
    </div>

    <div class="header-group">
      <h1>Generador de Escritos y Oficios</h1>
      <p class="muted">Redacta, firma y envía oficios oficiales a las Secretarías sin usar papel.</p>
    </div>

    <div id="alerta-perfil" class="profile-alert hide">
      <i class="ph-bold ph-warning-circle"></i>
      <div>
        <strong>Faltan datos en tu perfil.</strong><br>
        Para enviar documentos oficiales, necesitamos tu Matrícula, Categoría y Adscripción.
      </div>
    </div>

    <div class="card">
      <form id="fDenuncia">
        <div class="highlight-section" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div class="grid-full">
            <label for="puestoCatalogo">1. Destinatario Principal (Obligatorio)</label>
            <select id="puestoCatalogo" required>
              <option value="">— Selecciona la Secretaría o Comisión —</option>
              <optgroup label="Secretarías">
                <option value="Secretaría General|Dr. Juan Gerardo García González">Secretaría General</option>
                <option value="Secretaría de Interior y Propaganda|M.N.F. Amin Uriel Morales Sánchez">Secretaría de Interior y Propaganda</option>
                <option value="Secretaría de Conflictos|J.G.E. Arturo Ochoa Huacuz">Secretaría de Conflictos</option>
                <option value="Secretaría de Trabajo|E.G. Cándido Mora Alcauter">Secretaría de Trabajo</option>
                <option value="Secretaría del Exterior|M.N.F. Ignacio Agustín Orozco Pérez">Secretaría del Exterior</option>
                <option value="Tesorería|EST. Azucena Herrera Martínez">Tesorería</option>
                <option value="Secretaría de Previsión Social|A.M. Fabiola Farías Ambriz">Secretaría de Previsión Social</option>
                <option value="Secretaría de Igualdad Sustantiva|M.F. Gabriela Durán Negrete">Secretaría de Igualdad Sustantiva</option>
                <option value="Secretaría de Asuntos Técnicos|M.N.F. Horacio Peña Alfaro">Secretaría de Asuntos Técnicos</option>
                <option value="Secretaría de Actas y Acuerdos|M.G. César Augusto Contreras Flores">Secretaría de Actas y Acuerdos</option>
                <option value="Secretaría de Prensa|A.M. Yolanda Morelos Palomares">Secretaría de Prensa</option>
                <option value="Secretaría de Puestos Periféricos|M.N.F. Alejandra Johnson Aguirre">Secretaría de Puestos Periféricos</option>
                <option value="Secretaría de Admisión y Cambios|C.C. Uriel Tapia Pérez">Secretaría de Admisión y Cambios</option>
                <option value="Secretaría de Capacitación y Adiestramiento|O.P. América Hilda Reyes Reyes">Secretaría de Capacitación y Adiestramiento</option>
                <option value="Secretaría de Calidad y Modernización|Q.C. Gerardo Ordaz Salazar">Secretaría de Calidad y Modernización</option>
                <option value="Secretaría de Acción Social|E.E. Claudia Denisse Torres Rangel">Secretaría de Acción Social</option>
              </optgroup>
              </select>
          </div>
          <div>
            <label>Con atención a (Opcional)</label>
            <select id="atencionCatalogo"></select>
          </div>
          <div>
            <label>Con copia para (c.c.p.) (Opcional)</label>
            <select id="ccpCatalogo"></select>
          </div>
        </div>

        <input type="hidden" id="cargo">
        <input type="hidden" id="destinatario">

        <div>
          <label>Fecha del escrito</label>
          <input id="fecha" type="date">
        </div>
        <div>
          <label>Ciudad / Municipio</label>
          <input id="ciudad" placeholder="Ej. Lázaro Cárdenas, Mich." required>
        </div>

        <div class="grid-full">
          <label>2. Descripción de los hechos</label>
          <textarea id="problematica" required placeholder="Explica tu trámite o solicitud..."></textarea>
        </div>

        <div class="grid-full" style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
          <button type="button" class="btn" id="btn-activar-evidencia" style="background: rgba(56, 189, 248, 0.1); border-color: var(--primary);">
            <i class="ph-bold ph-camera"></i> ¿Deseas anexar fotografías de evidencia?
          </button>
        </div>

        <div id="seccion-evidencia" class="grid-full evidence-section">
          <label style="color: var(--success);">Cargar fotos de evidencia (Se anexarán al PDF final)</label>
          <input type="file" id="fotos-input" accept="image/*" multiple style="margin-top: 10px;">
          <div id="preview-evidencia"></div>
        </div>

        <div id="alerta-sugerencia" class="profile-alert hide" style="grid-column: 1/-1; background: rgba(74, 222, 128, 0.15); border-color: rgba(74, 222, 128, 0.4); color: var(--success);">
          <i class="ph-bold ph-lightbulb"></i>
          <div style="flex: 1;"><span id="texto-sugerencia" style="font-size: 13px;"></span></div>
        </div>
        
        <div class="grid-full" style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 15px;">
          <button type="submit" class="btn primary" id="btnGenerarPrincipal">🚀 Generar Documento</button>
        </div>
      </form>
    </div>
  </div>

  <div id="status"></div>

  <div id="modal" class="modal">
    <div class="modal-card">
      <div class="modal-h">
        <span style="color:white; font-weight:bold;">Vista Previa del Oficio</span>
        <div style="display:flex; gap:8px;">
          <button class="btn success" id="btnSign" style="color:white;" disabled>✍️ Firmar y Enviar</button>
          <button class="btn" id="btnClose" style="color:#ef4444;">✖ Cancelar</button>
        </div>
      </div>
      <div class="modal-b" id="modalBody">
        <div id="page" class="page carta"><div id="sheet" class="sheet"></div></div>
      </div>
    </div>
  </div>

  <div id="modal-firma" class="modal">
    <div class="signature-container">
      <h3>Firma Digital</h3>
      <canvas id="firmaPad"></canvas>
      <div style="display: flex; gap: 10px; justify-content: center; margin-top: 16px;">
        <button class="btn" id="btnClearSignature">Borrar</button>
        <button class="btn success" id="btnConfirmSignature" style="color: white;">Confirmar Envío</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <script>
    const SUPABASE_URL = "https://axsncdwshdvsysrpikwj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4c25jZHdzaGR2c3lzcnBpa3dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAyMjkwMjQsImV4cCI6MjA3NTgwNTAyNH0.oapcH219puVjaR2DcG7dX51uhwVn530L1hhz8ASv7qs";
    const supabaseApp = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;
    let currentFolio = ""; 
    let evidenciasData = []; // Guardará las fotos en base64

    const API_BASE = "https://sinos-api.onrender.com";
    const $ = s => document.querySelector(s);

    const showStatus = (t) => {
      const s = $('#status');
      s.textContent = t;
      s.classList.add('visible');
      setTimeout(() => s.classList.remove('visible'), 4000);
    };

    // --- MANEJO DE EVIDENCIA ---
    $('#btn-activar-evidencia').addEventListener('click', () => {
        $('#seccion-evidencia').classList.toggle('active');
    });

    $('#fotos-input').addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        const preview = $('#preview-evidencia');
        preview.innerHTML = "";
        evidenciasData = [];

        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = document.createElement('img');
                img.src = event.target.result;
                img.className = "thumb";
                preview.appendChild(img);
                evidenciasData.push(event.target.result); // Guardar para el PDF
            };
            reader.readAsDataURL(file);
        });
    });

    // --- INICIALIZACIÓN Y FUNCIONES BASE ---
    async function initUser() {
      const htmlOpciones = '<option value="">— Ninguno —</option>' + $('#puestoCatalogo').innerHTML;
      $('#atencionCatalogo').innerHTML = htmlOpciones;
      $('#ccpCatalogo').innerHTML = htmlOpciones;

      const { data: { session } } = await supabaseApp.auth.getSession();
      if (session) currentUser = session.user;
      
      const { data: prof } = await supabaseApp.from('profiles').select('*').eq('user_id', currentUser?.id).single();
      if (prof) {
        $('#nombre').value = prof.display_name || '';
        $('#matricula').value = prof.matricula || '';
        $('#categoria').value = prof.categoria || '';
        $('#lugar').value = prof.adscripcion || '';
      }
      $('#fecha').value = new Date().toISOString().slice(0,10);
    }

    $('#puestoCatalogo').addEventListener('change', (e) => {
      const parts = e.target.value.split('|');
      $('#cargo').value = parts[0] || '';
      $('#destinatario').value = parts[1] || '';
    });

    async function ejecutarGeneracion() {
      const targetSelect = $('#puestoCatalogo');
      const areaTexto = targetSelect.options[targetSelect.selectedIndex].text;
      currentFolio = await generarFolio(areaTexto);

      const d = {
        ciudad: $('#ciudad').value, fecha: $('#fecha').value,
        destinatario: $('#destinatario').value, cargo: $('#cargo').value,
        nombre: $('#nombre').value, matricula: $('#matricula').value,
        categoria: $('#categoria').value, lugar: $('#lugar').value,
        atencionVal: $('#atencionCatalogo').value, ccpVal: $('#ccpCatalogo').value
      };
      
      const cuerpoIA = await redactarIA($('#problematica').value);
      $('#sheet').innerHTML = generarContenido(d, cuerpoIA, currentFolio);
      $('#modal').classList.add('show');
    }

    async function generarFolio(area) {
      const year = new Date().getFullYear();
      return `${area.slice(0,2).toUpperCase()}-${year}-0001`; // Simplificado para ejemplo
    }

    async function redactarIA(prob) {
      return "Por medio de la presente solicito: " + prob;
    }

    const generarContenido = (d, cuerpo, folio) => {
      let atn = d.atencionVal ? `<div style="font-weight:bold;">At'n: ${d.atencionVal.split('|')[1]}</div>` : "";
      let ccp = d.ccpVal ? `<div style="font-size:8pt; margin-top:30px;">c.c.p. ${d.ccpVal.split('|')[1]}</div>` : "";
      return `
        <header>Folio: ${folio}<br>${d.ciudad}, a ${d.fecha}</header>
        <div class="dest">${d.destinatario}</div>
        <div>${d.cargo}</div>
        ${atn}
        <div class="cuerpo">${cuerpo}</div>
        <div class="pie">${d.nombre}<br>${d.matricula}${ccp}</div>
      `;
    };

    // --- PROCESAMIENTO FINAL DEL PDF CON EVIDENCIAS ---
    $('#btnConfirmSignature').addEventListener('click', async () => {
      const btn = $('#btnConfirmSignature');
      btn.disabled = true;
      btn.innerHTML = "⏳ Generando PDF Multinivel...";

      const pageEl = $('#page');
      try {
        const canvasDoc = await html2canvas(pageEl, { scale: 2 });
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'pt', format: 'letter' });
        
        // PÁGINA 1: Escrito Principal
        const imgData = canvasDoc.toDataURL('image/jpeg', 1.0);
        doc.addImage(imgData, 'JPEG', 0, 0, 612, 792);

        // PÁGINAS SIGUIENTES: Evidencias
        if (evidenciasData.length > 0) {
            evidenciasData.forEach((imgBase64, index) => {
                doc.addPage();
                doc.setFontSize(14);
                doc.text(`Anexo de Evidencia ${index + 1}`, 40, 40);
                // Añadir imagen centrada (ajustando tamaño para que quepa en la hoja)
                doc.addImage(imgBase64, 'JPEG', 40, 60, 532, 400); 
            });
        }

        const pdfBlob = doc.output('blob');
        // Aquí seguiría tu lógica de subir a Supabase...
        doc.save(`${currentFolio}.pdf`); // Descarga directa para prueba
        alert("Escrito generado con evidencias correctamente.");
        location.reload();

      } catch (e) { console.error(e); btn.disabled = false; }
    });

    // Lógica de firma simple para activar el flujo
    const canvasFirma = $('#firmaPad');
    const ctx = canvasFirma.getContext('2d');
    canvasFirma.addEventListener('mousedown', () => ctx.beginPath());
    canvasFirma.addEventListener('mousemove', (e) => { 
        if(e.buttons !== 1) return;
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
    });

    $('#fDenuncia').addEventListener('submit', (e) => { e.preventDefault(); ejecutarGeneracion(); });
    $('#btnClose').addEventListener('click', () => $('#modal').classList.remove('show'));
    $('#btnSign').addEventListener('click', () => $('#modal-firma').classList.add('show'));
    $('#btnSign').disabled = false;

    document.addEventListener('DOMContentLoaded', initUser);
  </script>
</body>
</html>
