<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Núcleo de Defensa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/duotone/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  
  <style>
    :root {
      --bg-body: #1b2e45; 
      --panel-base: 46, 79, 119;
      --primary: #4da1a8; 
      --primary-light: #7ad1d6;
      --text-main: #f0fdfa; 
      --text-muted: #bce9eb;
      --danger: #ff7b7b;
      --ring: rgba(77, 161, 168, .35);
    }
    body {
      background-color: var(--bg-body);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .hide { display: none !important; }
    
    /* Pantalla de carga y error */
    .status-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 80vh;
      text-align: center;
    }
    .status-screen i { font-size: 64px; margin-bottom: 16px; }
    .status-screen h2 { margin: 0 0 8px 0; font-size: 24px; }
    .status-screen p { color: var(--text-muted); font-size: 15px; max-width: 400px; }
    .error-icon { color: var(--danger); filter: drop-shadow(0 0 10px rgba(255,123,123,0.3)); }
    .loading-icon { color: var(--primary-light); animation: spin 2s linear infinite; }
    
    /* Interfaz principal del módulo */
    .dashboard-header {
      border-bottom: 1px solid var(--ring);
      padding-bottom: 20px;
      margin-bottom: 24px;
    }
    .dashboard-header h1 { margin: 0; font-size: 24px; color: var(--primary-light); }
    .dashboard-header p { margin: 4px 0 0 0; color: var(--text-muted); font-size: 14px; }
    .unidad-badge {
      display: inline-block;
      margin-top: 12px;
      background: rgba(77, 161, 168, 0.15);
      border: 1px solid var(--ring);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    .card {
      background: rgba(var(--panel-base), 0.35);
      border: 1px solid var(--ring);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <div id="status-container" class="status-screen">
    <i id="status-icon" class="ph-duotone ph-spinner loading-icon"></i>
    <h2 id="status-title">Verificando credenciales...</h2>
    <p id="status-desc">Conectando con el servidor seguro.</p>
  </div>

  <div id="app-container" class="hide">
    <div class="dashboard-header">
      <h1><i class="ph-duotone ph-scales"></i> Núcleo de Defensa</h1>
      <p>Panel exclusivo para Representación Sindical.</p>
      <div id="unidad-nombre" class="unidad-badge">Cargando unidad...</div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">Gestión de Casos</h3>
      <p style="color: var(--text-muted); font-size: 14px;">Aquí podrás registrar y dar seguimiento a los asuntos de tu delegación.</p>
    </div>
  </div>

  <script>
    // Inicializar cliente Supabase con tus credenciales
    const supabaseUrl = "https://axsncdwshdvsysrpikwj.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4c25jZHdzaGR2c3lzcnBpa3dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAyMjkwMjQsImV4cCI6MjA3NTgwNTAyNH0.oapcH219puVjaR2DcG7dX51uhwVn530L1hhz8ASv7qs";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const statusContainer = document.getElementById('status-container');
    const appContainer = document.getElementById('app-container');
    const statusIcon = document.getElementById('status-icon');
    const statusTitle = document.getElementById('status-title');
    const statusDesc = document.getElementById('status-desc');
    const unidadBadge = document.getElementById('unidad-nombre');

    function showError(title, desc) {
      if (statusIcon) statusIcon.className = "ph-fill ph-warning-circle error-icon";
      if (statusTitle) {
        statusTitle.textContent = title;
        statusTitle.style.color = "var(--danger)";
      }
      if (statusDesc) statusDesc.textContent = desc;
    }

    async function initModulo() {
      try {
        console.log("1. Iniciando validación de Núcleo...");
        
        // Obtener la sesión activa del usuario
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();
        
        if (sessionError) {
          console.error("Error de sesión:", sessionError);
          showError("Error de Autenticación", sessionError.message);
          return;
        }
        
        if (!session) {
          console.log("No hay sesión activa.");
          showError("Acceso Denegado", "No se detectó una sesión activa. Por favor, inicia sesión.");
          return;
        }

        const user = session.user;

        // --- NUEVA LÓGICA: VERIFICACIÓN DE ADMINISTRADOR ---
        // Comprobamos si el rol está definido en los metadatos del usuario.
        // Soporta llaves 'role' o 'rol' en user_metadata, o en app_metadata.
        const userRole = user.user_metadata?.role || user.user_metadata?.rol || user.app_metadata?.role;
        const isAdmin = userRole === 'admin' || userRole === 'administrador'; // Puedes ajustar la palabra clave según lo tengas en BD

        if (isAdmin) {
          console.log("2. Acceso concedido: Cuenta de Administrador detectada.");
          
          if (unidadBadge) unidadBadge.innerHTML = `<i class="ph-bold ph-shield-star"></i> Administrador General`;
          if (statusContainer) statusContainer.classList.add('hide');
          if (appContainer) appContainer.classList.remove('hide');
          
          // Retornamos aquí para evitar que el admin pase por la validación de la lista blanca
          return;
        }
        // ---------------------------------------------------

        // Si NO es admin, continuamos con la validación de la lista blanca
        const userEmail = user.email || "";
        if (!userEmail) {
          console.log("El usuario no tiene email registrado.");
          showError("Datos Incompletos", "Tu cuenta no tiene un correo válido asociado para verificar identidad.");
          return;
        }

        // Extraer la matrícula/ID del correo
        const userID = userEmail.split('@')[0].toUpperCase();
        console.log("3. Buscando en Lista Blanca el ID:", userID);

        // Consultar la Lista Blanca en la base de datos
        const { data: authData, error: dbError } = await supabase
          .from('nucleo_autorizados')
          .select('nombre_unidad')
          .eq('cuenta_id', userID)
          .maybeSingle();

        if (dbError) {
          console.error("Error en base de datos:", dbError);
          showError("Error de Base de Datos", "No pudimos conectar con los registros de seguridad.");
          return;
        }

        if (!authData) {
          console.log("4. Usuario no encontrado en la lista blanca.");
          showError("Privilegios Insuficientes", "Tu cuenta no está registrada como Delegación o Representación Sindical autorizada.");
          return;
        }

        console.log("4. Acceso concedido. Unidad:", authData.nombre_unidad);

        // Mostrar la app y ocultar la carga para representantes
        if (unidadBadge) unidadBadge.innerHTML = `<i class="ph-bold ph-identification-badge"></i> ${authData.nombre_unidad}`;
        if (statusContainer) statusContainer.classList.add('hide');
        if (appContainer) appContainer.classList.remove('hide');

      } catch (err) {
        console.error("Error crítico en Núcleo de Defensa:", err);
        showError("Error Inesperado", "Hubo un problema de código al procesar tu solicitud.");
      }
    }

    // Ejecutar la validación directamente. 
    // Al estar al final del HTML, el DOM ya existe y no necesitamos esperar el evento DOMContentLoaded.
    initModulo();
  </script>
</body>
</html>
