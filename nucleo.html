<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Núcleo de Defensa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/duotone/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  
  <style>
    :root {
      --bg-body: #1b2e45; 
      --panel-base: 46, 79, 119;
      --primary: #4da1a8; 
      --primary-light: #7ad1d6;
      --text-main: #f0fdfa; 
      --text-muted: #bce9eb;
      --danger: #ff7b7b;
      --ring: rgba(77, 161, 168, .35);
    }
    body {
      background-color: var(--bg-body);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .hide { display: none !important; }
    
    /* Pantalla de carga y error */
    .status-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 80vh;
      text-align: center;
    }
    .status-screen i { font-size: 64px; margin-bottom: 16px; }
    .status-screen h2 { margin: 0 0 8px 0; font-size: 24px; }
    .status-screen p { color: var(--text-muted); font-size: 15px; max-width: 400px; }
    .error-icon { color: var(--danger); filter: drop-shadow(0 0 10px rgba(255,123,123,0.3)); }
    .loading-icon { color: var(--primary-light); animation: spin 2s linear infinite; }
    
    /* Interfaz principal del módulo */
    .dashboard-header {
      border-bottom: 1px solid var(--ring);
      padding-bottom: 20px;
      margin-bottom: 24px;
    }
    .dashboard-header h1 { margin: 0; font-size: 24px; color: var(--primary-light); }
    .dashboard-header p { margin: 4px 0 0 0; color: var(--text-muted); font-size: 14px; }
    .unidad-badge {
      display: inline-block;
      margin-top: 12px;
      background: rgba(77, 161, 168, 0.15);
      border: 1px solid var(--ring);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    .card {
      background: rgba(var(--panel-base), 0.35);
      border: 1px solid var(--ring);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <div id="status-container" class="status-screen">
    <i id="status-icon" class="ph-duotone ph-spinner loading-icon"></i>
    <h2 id="status-title">Verificando credenciales...</h2>
    <p id="status-desc">Conectando con el servidor seguro.</p>
  </div>

  <div id="app-container" class="hide">
    <div class="dashboard-header">
      <h1><i class="ph-duotone ph-scales"></i> Núcleo de Defensa</h1>
      <p>Panel exclusivo para Representación Sindical.</p>
      <div id="unidad-nombre" class="unidad-badge">Cargando unidad...</div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">Gestión de Casos</h3>
      <p style="color: var(--text-muted); font-size: 14px;">Aquí podrás registrar y dar seguimiento a los asuntos de tu delegación.</p>
      </div>
  </div>

  <script>
    // Inicializar cliente Supabase con tus credenciales
    const supabaseUrl = "https://axsncdwshdvsysrpikwj.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4c25jZHdzaGR2c3lzcnBpa3dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAyMjkwMjQsImV4cCI6MjA3NTgwNTAyNH0.oapcH219puVjaR2DcG7dX51uhwVn530L1hhz8ASv7qs";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const statusContainer = document.getElementById('status-container');
    const appContainer = document.getElementById('app-container');
    const statusIcon = document.getElementById('status-icon');
    const statusTitle = document.getElementById('status-title');
    const statusDesc = document.getElementById('status-desc');
    const unidadBadge = document.getElementById('unidad-nombre');

    function showError(title, desc) {
      statusIcon.className = "ph-fill ph-warning-circle error-icon";
      statusTitle.textContent = title;
      statusDesc.textContent = desc;
      statusTitle.style.color = "var(--danger)";
    }

    async function initModulo() {
      try {
        // 1. Obtener la sesión activa del usuario
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();
        
        if (sessionError || !session) {
          showError("Acceso Denegado", "No se detectó una sesión activa. Por favor, inicia sesión en la plataforma principal.");
          return;
        }

        // 2. Extraer la matrícula/ID del correo (Ej: HGZ2_ZACAPU)
        const userEmail = session.user.email;
        const userID = userEmail.split('@')[0].toUpperCase();

        // 3. Consultar la Lista Blanca en la base de datos
        const { data: authData, error: dbError } = await supabase
          .from('nucleo_autorizados')
          .select('nombre_unidad')
          .eq('cuenta_id', userID)
          .maybeSingle();

        if (dbError || !authData) {
          showError("Privilegios Insuficientes", "Tu cuenta no está registrada como Delegación o Representación Sindical autorizada para este módulo.");
          return;
        }

        // 4. Si llegamos aquí, el usuario es legítimo. Mostramos la app.
        unidadBadge.innerHTML = `<i class="ph-bold ph-identification-badge"></i> ${authData.nombre_unidad}`;
        statusContainer.classList.add('hide');
        appContainer.classList.remove('hide');

        // Aquí puedes mandar llamar una función para cargar los datos de la tabla 'nucleo_gestiones'

      } catch (err) {
        console.error("Error en Núcleo de Defensa:", err);
        showError("Error de Conexión", "Hubo un problema al conectar con el servidor. Intenta nuevamente.");
      }
    }

    // Iniciar la validación al cargar la página
    document.addEventListener('DOMContentLoaded', initModulo);
  </script>
</body>
</html>
