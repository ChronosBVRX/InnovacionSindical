<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Escáner - Plataforma Sindical</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  
  <script src="https://docs.opencv.org/4.7.0/opencv.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/colonelparrot/jscanify@master/src/jscanify.min.js"></script>

  <style>
    :root {
      --panel-base: 46, 79, 119;
      --primary: #4da1a8; --primary-light: #7ad1d6;
      --text-main: #f0fdfa; --ring: rgba(77, 161, 168, .35); 
      --radius: 12px;
    }

    body {
      margin: 0; padding: 0; background-color: #0b1f2a; color: var(--text-main);
      font-family: 'Inter', sans-serif; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
    }

    .topbar {
      background: rgba(var(--panel-base), 0.9); padding: 16px; text-align: center;
      border-bottom: 1px solid var(--ring); display: flex; flex-direction: column; gap: 5px;
      position: relative;
    }
    .topbar h2 { margin: 0; font-size: 18px; font-weight: 600; color: var(--primary-light); }
    .topbar p { margin: 0; font-size: 14px; color: var(--text-main); }

    .btn-cerrar-app {
      position: absolute; left: 16px; top: 16px;
      background: none; border: none; color: var(--text-muted);
      font-size: 24px; cursor: pointer; padding: 4px;
    }

    .camera-container {
      flex: 1; position: relative; display: flex; justify-content: center; align-items: center;
      background: #000; overflow: hidden;
    }
    
    video { width: 100%; height: 100%; object-fit: cover; }

    .overlay-guide {
      position: absolute; border: 2px dashed rgba(77, 161, 168, 0.8);
      width: 80%; height: 30%; border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }

    #preview-img {
      display: none; width: 100%; height: 100%; object-fit: contain;
      background: #111; position: absolute; top: 0; left: 0; z-index: 10;
    }

    .controls {
      background: rgba(var(--panel-base), 0.9); padding: 24px; text-align: center;
      border-top: 1px solid var(--ring); z-index: 20;
    }

    .btn {
      background: var(--primary); color: #0b1f2a; border: none; padding: 16px;
      font-size: 16px; font-weight: 700; border-radius: var(--radius); width: 100%;
      cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #555; color: #aaa; cursor: not-allowed; }
    
    .btn-secondary { background: transparent; color: var(--primary-light); border: 1px solid var(--primary-light); margin-top: 12px; }
    .hide { display: none !important; }

    #loading-ia {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 20px;
      font-size: 12px; color: #fff; z-index: 15; text-align: center;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <button class="btn-cerrar-app" onclick="cerrarAppMovil()">
      <i class="ph-bold ph-x"></i>
    </button>
    <h2 id="instruccion-titulo">Iniciando cámara...</h2>
    <p id="instruccion-sub">Por favor, espera.</p>
  </div>

  <div class="camera-container">
    <video id="video" autoplay playsinline></video>
    <div id="guide" class="overlay-guide"></div>
    <div id="loading-ia">Cargando motor inteligente...</div>
    <img id="preview-img" alt="Vista previa">
  </div>

  <div class="controls">
    <button id="btn-capturar" class="btn" onclick="tomarFoto()" disabled>
      <i class="ph-bold ph-spinner ph-spin"></i> Preparando Escáner...
    </button>

    <div id="grupo-confirmar" class="hide">
      <button class="btn" onclick="confirmarFoto()">
        <i class="ph-bold ph-check"></i> Enviar Documento
      </button>
      <button class="btn btn-secondary" onclick="reintentarFoto()">
        <i class="ph-bold ph-arrow-counter-clockwise"></i> Volver a tomar
      </button>
    </div>
  </div>

  <canvas id="canvas-oculto" class="hide"></canvas>

  <script>
    const API_URL = 'https://sinos-api.onrender.com';
    const socket = io(API_URL);

    const urlParams = new URLSearchParams(window.location.search);
    const idSesion = urlParams.get('sesion') || 'TEST';
    const tipoScan = urlParams.get('tipo') || 'identificacion';

    const video = document.getElementById('video');
    const previewImg = document.getElementById('preview-img');
    const btnCapturar = document.getElementById('btn-capturar');
    const grupoConfirmar = document.getElementById('grupo-confirmar');
    const titulo = document.getElementById('instruccion-titulo');
    const subtitulo = document.getElementById('instruccion-sub');
    const guide = document.getElementById('guide');
    const loadingIa = document.getElementById('loading-ia');

    let pasoActual = 1; 
    let imagenFrente = null;
    let imagenReverso = null;
    let motorScanner = null;

    // Vigilar que OpenCV cargue correctamente
    let intentosCarga = 0;
    const intervalCarga = setInterval(() => {
      intentosCarga++;
      
      if (typeof cv !== 'undefined' && typeof jscanify !== 'undefined' && cv.Mat) {
        clearInterval(intervalCarga);
        motorScanner = new jscanify();
        
        loadingIa.style.display = 'none';
        btnCapturar.disabled = false;
        btnCapturar.innerHTML = '<i class="ph-bold ph-camera"></i> Escanear';
        
        if (tipoScan === 'documento') {
          guide.style.height = '80%'; 
          titulo.innerText = "Escáner de Documento";
          subtitulo.innerText = "Encuadra la hoja y toma la foto";
        } else {
          titulo.innerText = "Paso 1: Frente (INE)";
          subtitulo.innerText = "Alinea la credencial y captura";
        }
      } 
      else if (intentosCarga > 20) {
        clearInterval(intervalCarga);
        motorScanner = null;
        
        loadingIa.innerText = "Conexión lenta: Modo Básico Activo";
        setTimeout(() => loadingIa.style.display = 'none', 3000);
        
        btnCapturar.disabled = false;
        btnCapturar.innerHTML = '<i class="ph-bold ph-camera"></i> Capturar Normal';
      }
    }, 500);

    // Iniciar cámara web
    async function iniciarCamara() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
        });
        video.srcObject = stream;
      } catch (err) {
        alert("Error al acceder a la cámara.");
        titulo.innerText = "Cámara bloqueada";
      }
    }
    iniciarCamara();

    function tomarFoto() {
      titulo.innerText = "Procesando...";
      subtitulo.innerText = "Calculando bordes y perspectiva...";

      const canvas = document.getElementById('canvas-oculto');
      const ctx = canvas.getContext('2d');
      
      // OPTIMIZACIÓN: Reducir tamaño de la imagen para que el celular no se bloquee
      const maxAncho = 1200; 
      let scale = 1;
      if (video.videoWidth > maxAncho) {
        scale = maxAncho / video.videoWidth;
      }
      
      canvas.width = video.videoWidth * scale;
      canvas.height = video.videoHeight * scale;
      
      // Dibujar la foto escalada en el canvas
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      let resultCanvas = canvas;
      let exitoRecorte = false;

      // Si el motor está listo, intentamos recortar
      if (motorScanner) {
        try {
          // Definir proporciones esperadas (Horizontal para INE, Vertical para Documento)
          const anchoSalida = tipoScan === 'identificacion' ? 1000 : 800;
          const altoSalida = tipoScan === 'identificacion' ? 630 : 1130;

          // Extraer el papel con corrección de perspectiva
          const paperCanvas = motorScanner.extractPaper(canvas, anchoSalida, altoSalida);
          
          if (paperCanvas) {
            resultCanvas = paperCanvas;
            exitoRecorte = true;
          }
        } catch (e) {
          console.warn("Fallo al calcular los bordes", e);
        }
      }

      // Filtro de contraste tipo CamScanner
      const ctxResult = resultCanvas.getContext('2d');
      ctxResult.filter = 'contrast(1.4) grayscale(0.2)';
      ctxResult.drawImage(resultCanvas, 0, 0);

      const base64Image = resultCanvas.toDataURL('image/jpeg', 0.8);
      previewImg.src = base64Image;
      previewImg.style.display = 'block';
      video.style.display = 'none';
      guide.style.display = 'none';

      btnCapturar.classList.add('hide');
      grupoConfirmar.classList.remove('hide');

      // Dar retroalimentación al usuario
      if (exitoRecorte) {
        titulo.innerText = "¡Recorte Exitoso!";
        subtitulo.innerText = "¿El documento es legible?";
        document.getElementById('instruccion-titulo').style.color = '#4da1a8'; // Verde/Azul
      } else {
        titulo.innerText = "No se detectaron bordes";
        subtitulo.innerText = "Pon el documento sobre un fondo oscuro.";
        document.getElementById('instruccion-titulo').style.color = '#ff6b6b'; // Rojo
      }
    }

    function reintentarFoto() {
      previewImg.style.display = 'none';
      video.style.display = 'block';
      guide.style.display = 'block';
      btnCapturar.classList.remove('hide');
      grupoConfirmar.classList.add('hide');
      document.getElementById('instruccion-titulo').style.color = 'var(--primary-light)';

      if (tipoScan === 'documento') {
        titulo.innerText = motorScanner ? "Escáner de Documento" : "Escáner Básico";
        subtitulo.innerText = "Encuadra la hoja y toma la foto";
      } else {
        titulo.innerText = pasoActual === 1 ? "Paso 1: Frente (INE)" : "Paso 2: Reverso (INE)";
        subtitulo.innerText = "Alinea la credencial y captura";
      }
    }

    function confirmarFoto() {
      const imgData = previewImg.src;

      if (tipoScan === 'documento') {
        enviarAlServidor(imgData);
      } else {
        if (pasoActual === 1) {
          imagenFrente = imgData;
          pasoActual = 2;
          titulo.innerText = "Paso 2: Reverso (INE)";
          subtitulo.innerText = "Voltea la credencial y encuádrala";
          document.getElementById('instruccion-titulo').style.color = 'var(--primary-light)';
          reintentarFoto();
        } else {
          imagenReverso = imgData;
          procesarYEnviarIdentificacion();
        }
      }
    }

    function procesarYEnviarIdentificacion() {
      titulo.innerText = "Procesando...";
      subtitulo.innerText = "Uniendo documento en una hoja...";
      grupoConfirmar.classList.add('hide');

      const canvasFinal = document.createElement('canvas');
      const ctxFinal = canvasFinal.getContext('2d');
      
      canvasFinal.width = 1240;
      canvasFinal.height = 1754;

      ctxFinal.fillStyle = "white";
      ctxFinal.fillRect(0, 0, canvasFinal.width, canvasFinal.height);

      const img1 = new Image();
      const img2 = new Image();

      img1.onload = () => {
        ctxFinal.drawImage(img1, 100, 150, 1040, 650);
        img2.onload = () => {
          ctxFinal.drawImage(img2, 100, 900, 1040, 650);
          const documentoA4 = canvasFinal.toDataURL('image/jpeg', 0.8);
          enviarAlServidor(documentoA4);
        };
        img2.src = imagenReverso;
      };
      img1.src = imagenFrente;
    }

    function enviarAlServidor(imagenBase64) {
      titulo.innerText = "¡Enviado!";
      subtitulo.innerText = "Revisa la pantalla del Kiosko.";
      grupoConfirmar.classList.add('hide');
      btnCapturar.classList.add('hide');
      previewImg.style.display = 'block';

      socket.emit('enviar-documento', { 
        sesion: idSesion, 
        archivo: imagenBase64 
      });
      
      setTimeout(() => {
        alert("El documento ha sido enviado. Ya puedes cerrar esta ventana y mirar el Kiosko.");
      }, 500);
    }

    function cerrarAppMovil() {
      window.close();
      document.body.innerHTML = '<div style="display:flex; height:100vh; align-items:center; justify-content:center; text-align:center; padding:20px;"><div><i class="ph-bold ph-check-circle" style="font-size:64px; color:var(--primary-light);"></i><h2 style="margin-top:20px;">Escaneo Cancelado</h2><p style="color:var(--text-muted);">Ya puedes cerrar esta pestaña.</p></div></div>';
    }
  </script>
</body>
</html>
