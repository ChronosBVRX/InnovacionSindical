<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Escáner - Plataforma Sindical</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

  <style>
    :root {
      --panel-base: 46, 79, 119;
      --primary: #4da1a8; --primary-light: #7ad1d6;
      --text-main: #f0fdfa; --ring: rgba(77, 161, 168, .35); 
      --radius: 12px;
    }

    body {
      margin: 0; padding: 0; background-color: #0b1f2a; color: var(--text-main);
      font-family: 'Inter', sans-serif; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
    }

    .topbar {
      background: rgba(var(--panel-base), 0.9); padding: 16px; text-align: center;
      border-bottom: 1px solid var(--ring); display: flex; flex-direction: column; gap: 5px;
      position: relative; z-index: 50;
    }
    .topbar h2 { margin: 0; font-size: 18px; font-weight: 600; color: var(--primary-light); }
    .topbar p { margin: 0; font-size: 14px; color: var(--text-main); }

    .btn-cerrar-app {
      position: absolute; left: 16px; top: 16px;
      background: none; border: none; color: var(--text-muted);
      font-size: 24px; cursor: pointer; padding: 4px;
    }

    .camera-container {
      flex: 1; position: relative; display: flex; justify-content: center; align-items: center;
      background: #000; overflow: hidden; width: 100%;
    }
    
    video { width: 100%; height: 100%; object-fit: cover; }

    /* Contenedor especial para la imagen que se va a recortar */
    .img-container {
      display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 10;
    }
    #preview-img { max-width: 100%; display: block; }

    .controls {
      background: rgba(var(--panel-base), 0.9); padding: 24px; text-align: center;
      border-top: 1px solid var(--ring); z-index: 20;
    }

    .btn {
      background: var(--primary); color: #0b1f2a; border: none; padding: 16px;
      font-size: 16px; font-weight: 700; border-radius: var(--radius); width: 100%;
      cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .btn:active { transform: scale(0.98); }
    
    .btn-secondary { background: transparent; color: var(--primary-light); border: 1px solid var(--primary-light); margin-top: 12px; }
    .hide { display: none !important; }
    
    /* Personalización del color del cropper para que combine con tu PSD */
    .cropper-view-box, .cropper-face { border-radius: 4px; }
    .cropper-line, .cropper-point { background-color: var(--primary-light) !important; }
  </style>
</head>
<body>

  <div class="topbar">
    <button class="btn-cerrar-app" onclick="cerrarAppMovil()">
      <i class="ph-bold ph-x"></i>
    </button>
    <h2 id="instruccion-titulo">Iniciando cámara...</h2>
    <p id="instruccion-sub">Encuadra y toma la foto</p>
  </div>

  <div class="camera-container">
    <video id="video" autoplay playsinline></video>
    
    <div id="crop-area" class="img-container">
      <img id="preview-img" src="" alt="Vista previa">
    </div>
  </div>

  <div class="controls">
    <button id="btn-capturar" class="btn" onclick="tomarFoto()">
      <i class="ph-bold ph-camera"></i> Tomar Foto
    </button>

    <div id="grupo-confirmar" class="hide">
      <button class="btn" onclick="confirmarFoto()">
        <i class="ph-bold ph-scissors"></i> Confirmar Recorte
      </button>
      <button class="btn btn-secondary" onclick="reintentarFoto()">
        <i class="ph-bold ph-arrow-counter-clockwise"></i> Tomar de nuevo
      </button>
    </div>
  </div>

  <script>
    const API_URL = 'https://sinos-api.onrender.com';
    const socket = io(API_URL);

    const urlParams = new URLSearchParams(window.location.search);
    const idSesion = urlParams.get('sesion') || 'TEST';
    const tipoScan = urlParams.get('tipo') || 'identificacion';

    const video = document.getElementById('video');
    const cropArea = document.getElementById('crop-area');
    const previewImg = document.getElementById('preview-img');
    const btnCapturar = document.getElementById('btn-capturar');
    const grupoConfirmar = document.getElementById('grupo-confirmar');
    const titulo = document.getElementById('instruccion-titulo');
    const subtitulo = document.getElementById('instruccion-sub');

    let cropper = null;
    let pasoActual = 1; 
    let imagenFrente = null;
    let imagenReverso = null;

    // Configurar instrucciones iniciales
    function actualizarTextos() {
      if (tipoScan === 'documento') {
        titulo.innerText = "Escáner de Documento";
        subtitulo.innerText = "Toma la foto y ajusta los bordes";
      } else {
        titulo.innerText = pasoActual === 1 ? "Paso 1: Frente (INE)" : "Paso 2: Reverso (INE)";
        subtitulo.innerText = "Toma la foto y ajusta los bordes";
      }
    }
    actualizarTextos();

    // 1. Iniciar cámara web
    async function iniciarCamara() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
        });
        video.srcObject = stream;
      } catch (err) {
        alert("Error al acceder a la cámara.");
        titulo.innerText = "Cámara bloqueada";
      }
    }
    iniciarCamara();

    // 2. Tomar foto de todo el cuadro original y abrir el editor de recorte
    function tomarFoto() {
      const canvasFull = document.createElement('canvas');
      canvasFull.width = video.videoWidth;
      canvasFull.height = video.videoHeight;
      const ctxFull = canvasFull.getContext('2d');
      ctxFull.drawImage(video, 0, 0, canvasFull.width, canvasFull.height);

      // Pasar la foto completa al contenedor de recorte
      previewImg.src = canvasFull.toDataURL('image/jpeg', 1.0);
      video.style.display = 'none';
      cropArea.style.display = 'block';

      // Cambiar botones
      btnCapturar.classList.add('hide');
      grupoConfirmar.classList.remove('hide');

      titulo.innerText = "Ajustar Recorte";
      subtitulo.innerText = "Arrastra las esquinas si es necesario";

      // Inicializar Cropper.js con la proporción adecuada
      const proporcion = tipoScan === 'identificacion' ? (85 / 54) : (8.5 / 11); // INE horizontal o Carta vertical

      cropper = new Cropper(previewImg, {
        aspectRatio: proporcion,
        viewMode: 1,
        dragMode: 'move',
        autoCropArea: 0.9, // Qué tan grande aparece el cuadro por defecto
        background: false,
        guides: true,
      });
    }

    // 3. Volver a intentar la foto
    function reintentarFoto() {
      if (cropper) { cropper.destroy(); cropper = null; }
      
      cropArea.style.display = 'none';
      video.style.display = 'block';
      
      btnCapturar.classList.remove('hide');
      grupoConfirmar.classList.add('hide');

      actualizarTextos();
    }

    // 4. Confirmar el recorte y extraer la imagen seleccionada
    function confirmarFoto() {
      if (!cropper) return;

      // Obtener el recorte con buena calidad
      const canvasRecorte = cropper.getCroppedCanvas({
        width: tipoScan === 'identificacion' ? 1000 : 800
      });

      // Aplicarle el filtro de "CamScanner" (Más contraste, menos grises)
      const canvasMejorado = document.createElement('canvas');
      canvasMejorado.width = canvasRecorte.width;
      canvasMejorado.height = canvasRecorte.height;
      const ctxMejorado = canvasMejorado.getContext('2d');
      
      ctxMejorado.filter = 'contrast(1.3) grayscale(0.1)';
      ctxMejorado.drawImage(canvasRecorte, 0, 0);

      const imgFinal = canvasMejorado.toDataURL('image/jpeg', 0.9);

      // Destruir el editor
      cropper.destroy();
      cropper = null;

      // Lógica de avance
      if (tipoScan === 'documento') {
        enviarAlServidor(imgFinal);
      } else {
        if (pasoActual === 1) {
          imagenFrente = imgFinal;
          pasoActual = 2;
          reintentarFoto();
        } else {
          imagenReverso = imgFinal;
          procesarYEnviarIdentificacion();
        }
      }
    }

    // 5. Unir frente y reverso en A4 (Igual que antes)
    function procesarYEnviarIdentificacion() {
      titulo.innerText = "Procesando...";
      subtitulo.innerText = "Uniendo documento en una hoja...";
      
      cropArea.style.display = 'none';
      btnCapturar.classList.add('hide');
      grupoConfirmar.classList.add('hide');

      const canvasFinal = document.createElement('canvas');
      const ctxFinal = canvasFinal.getContext('2d');
      
      canvasFinal.width = 1240;
      canvasFinal.height = 1754;

      ctxFinal.fillStyle = "white";
      ctxFinal.fillRect(0, 0, canvasFinal.width, canvasFinal.height);

      const img1 = new Image();
      const img2 = new Image();

      img1.onload = () => {
        ctxFinal.drawImage(img1, 100, 150, 1040, 650);
        img2.onload = () => {
          ctxFinal.drawImage(img2, 100, 900, 1040, 650);
          const documentoA4 = canvasFinal.toDataURL('image/jpeg', 0.8);
          enviarAlServidor(documentoA4);
        };
        img2.src = imagenReverso;
      };
      img1.src = imagenFrente;
    }

    function enviarAlServidor(imagenBase64) {
      titulo.innerText = "¡Enviado!";
      subtitulo.innerText = "Revisa la pantalla del Kiosko.";
      
      cropArea.style.display = 'block';
      previewImg.src = imagenBase64; // Mostrar resultado final

      socket.emit('enviar-documento', { 
        sesion: idSesion, 
        archivo: imagenBase64 
      });
      
      setTimeout(() => {
        alert("El documento ha sido enviado con éxito. Ya puedes cerrar esta ventana.");
      }, 500);
    }

    function cerrarAppMovil() {
      window.close();
      document.body.innerHTML = '<div style="display:flex; height:100vh; align-items:center; justify-content:center; text-align:center; padding:20px;"><div><i class="ph-bold ph-check-circle" style="font-size:64px; color:var(--primary-light);"></i><h2 style="margin-top:20px;">Escaneo Cancelado</h2><p style="color:var(--text-muted);">Ya puedes cerrar esta pestaña.</p></div></div>';
    }
  </script>
</body>
</html>
