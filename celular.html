<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Escáner - Plataforma Sindical</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    :root {
      --panel-base: 46, 79, 119;
      --primary: #4da1a8; --primary-light: #7ad1d6;
      --text-main: #f0fdfa;
      --text-muted: rgba(240, 253, 250, 0.65);
      --ring: rgba(77, 161, 168, .35);
      --radius: 12px;
    }

    body {
      margin: 0; padding: 0; background-color: #0b1f2a; color: var(--text-main);
      font-family: 'Inter', sans-serif; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
    }

    .topbar {
      background: rgba(var(--panel-base), 0.9); padding: 16px; text-align: center;
      border-bottom: 1px solid var(--ring); display: flex; flex-direction: column; gap: 5px;
      position: relative; z-index: 50;
    }
    .topbar h2 { margin: 0; font-size: 18px; font-weight: 600; color: var(--primary-light); }
    .topbar p { margin: 0; font-size: 14px; color: var(--text-main); }

    .btn-cerrar-app {
      position: absolute; left: 16px; top: 16px;
      background: none; border: none; color: var(--text-muted);
      font-size: 24px; cursor: pointer; padding: 4px;
    }

    .camera-container {
      flex: 1; position: relative; display: flex; justify-content: center; align-items: center;
      background: #000; overflow: hidden; width: 100%;
    }

    video { width: 100%; height: 100%; object-fit: contain; }

    .guideline-overlay {
      position: absolute; inset: 0; pointer-events: none; z-index: 5;
      display: flex; justify-content: center; align-items: center; overflow: hidden;
    }
    .guideline-frame {
      border: 2px dashed var(--primary-light);
      border-radius: 8px;
      box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.6);
      transition: all 0.3s ease;
    }

    .img-container {
      display: none; width: 100%; height: 100%;
      position: absolute; top: 0; left: 0; z-index: 10;
      background: #000;
      justify-content: center; align-items: center;
    }
    
    #preview-img { max-width: 100%; max-height: 100%; display: block; object-fit: contain; }

    /* CONTENEDOR PARA SUBIR PDF */
    #pdf-upload-container {
      flex: 1; display: none; flex-direction: column;
      align-items: center; justify-content: center; padding: 30px; text-align: center;
    }

    .overlay {
      position: absolute; inset: 0; z-index: 15;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.35); backdrop-filter: blur(2px);
      text-align: center; padding: 24px;
    }
    .overlay .card {
      width: min(420px, 92vw); background: rgba(var(--panel-base), 0.85);
      border: 1px solid var(--ring); border-radius: 16px;
      padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    .overlay .title { font-weight: 700; color: var(--primary-light); margin: 0 0 6px 0; }
    .overlay .desc { margin: 0; color: var(--text-main); opacity: .9; font-size: 14px; }

    .controls {
      background: rgba(var(--panel-base), 0.9); padding: 24px; text-align: center;
      border-top: 1px solid var(--ring); z-index: 20;
    }

    .btn {
      background: var(--primary); color: #0b1f2a; border: none; padding: 16px;
      font-size: 16px; font-weight: 700; border-radius: var(--radius); width: 100%;
      cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .btn:active { transform: scale(0.98); }

    .btn-secondary { background: transparent; color: var(--primary-light); border: 1px solid var(--primary-light); margin-top: 12px; }
    .hide { display: none !important; }

    .cropper-view-box, .cropper-face { border-radius: 4px; }
    .cropper-line, .cropper-point { background-color: var(--primary-light) !important; }
  </style>
</head>

<body>
  <div class="topbar">
    <button class="btn-cerrar-app" onclick="cerrarAppMovil()">
      <i class="ph-bold ph-x"></i>
    </button>
    <h2 id="instruccion-titulo">Cargando...</h2>
    <p id="instruccion-sub">Preparando herramienta</p>
  </div>

  <div class="camera-container" id="camera-section">
    <video id="video" autoplay playsinline></video>

    <div class="guideline-overlay" id="guideline">
      <div class="guideline-frame"></div>
    </div>

    <div id="crop-area" class="img-container">
      <img id="preview-img" src="" alt="Vista previa">
    </div>

    <div id="overlay" class="overlay">
      <div class="card">
        <p class="title" id="overlay-title">Procesando…</p>
        <p class="desc" id="overlay-desc">Detectando bordes y enderezando el documento.</p>
      </div>
    </div>
  </div>

  <div id="pdf-upload-container">
    <i class="ph-duotone ph-file-pdf" style="font-size: 80px; color: var(--primary-light); margin-bottom: 20px;"></i>
    <h3 style="margin: 0 0 10px 0;">Sube tu archivo PDF</h3>
    <p style="color: var(--text-muted); margin-bottom: 30px;">Recuerda que el documento no debe superar las 5 hojas permitidas.</p>
    
    <input type="file" id="pdf-file-input" accept="application/pdf" style="display: none;">
    <button class="btn" style="width: 80%;" onclick="document.getElementById('pdf-file-input').click()">
      <i class="ph-bold ph-upload-simple"></i> Seleccionar PDF
    </button>
  </div>

  <div class="controls" id="controls-section">
    <button id="btn-capturar" class="btn" onclick="tomarFoto()">
      <i class="ph-bold ph-camera"></i> Tomar Foto
    </button>

    <div id="grupo-confirmar" class="hide">
      <button class="btn" onclick="confirmarFoto()">
        <i class="ph-bold ph-check"></i> Confirmar y Enviar
      </button>
      <button class="btn btn-secondary" onclick="reintentarFoto()">
        <i class="ph-bold ph-arrow-counter-clockwise"></i> Tomar de nuevo
      </button>
    </div>
  </div>

  <script>
    // Configuración Inicial
    const API_URL = 'https://sinos-api.onrender.com';
    const socket = io(API_URL);

    const urlParams = new URLSearchParams(window.location.search);
    const idSesion = urlParams.get('sesion') || 'TEST';
    const tipoScan = urlParams.get('tipo') || 'identificacion'; 

    const video = document.getElementById('video');
    const cropArea = document.getElementById('crop-area');
    const previewImg = document.getElementById('preview-img');
    const btnCapturar = document.getElementById('btn-capturar');
    const grupoConfirmar = document.getElementById('grupo-confirmar');
    const titulo = document.getElementById('instruccion-titulo');
    const subtitulo = document.getElementById('instruccion-sub');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayDesc = document.getElementById('overlay-desc');
    const guideline = document.getElementById('guideline');

    let cropper = null;
    let pasoActual = 1;
    let imagenFrente = null;
    let imagenReverso = null;
    let streamActual = null;
    let scanicScanner = null;
    let autoscanDataUrl = null; 

    function setOverlay(show, titleText = "Procesando…", descText = "Por favor espera.") {
      overlayTitle.innerText = titleText;
      overlayDesc.innerText = descText;
      overlay.style.display = show ? 'flex' : 'none';
    }

    function actualizarTextos() {
      const guidelineFrame = document.querySelector('.guideline-frame');
      if (tipoScan === 'documento') {
        titulo.innerText = "Escáner de Documento";
        subtitulo.innerText = "Encuadra el documento en un fondo oscuro";
        if (guidelineFrame) {
          guidelineFrame.style.aspectRatio = "8.5 / 11";
          guidelineFrame.style.width = "85%";
          guidelineFrame.style.maxWidth = "400px";
        }
      } else if (tipoScan === 'identificacion') {
        titulo.innerText = pasoActual === 1 ? "Paso 1: Frente (INE)" : "Paso 2: Reverso (INE)";
        subtitulo.innerText = "Alinea la credencial dentro del recuadro";
        if (guidelineFrame) {
          guidelineFrame.style.aspectRatio = "85 / 54";
          guidelineFrame.style.width = "85%";
          guidelineFrame.style.maxWidth = "400px";
        }
      }
    }

    // =============================
    // LÓGICA DE PDF (NUEVO)
    // =============================
    if (tipoScan === 'pdf') {
      document.getElementById('camera-section').style.display = 'none';
      document.getElementById('controls-section').style.display = 'none';
      document.getElementById('pdf-upload-container').style.display = 'flex';
      
      titulo.innerText = "Enviar Documento PDF";
      subtitulo.innerText = "Selecciona un archivo de tu dispositivo";

      // Listener para el input file del PDF
      document.getElementById('pdf-file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        if (file.type !== 'application/pdf') {
          alert('Por favor, selecciona un archivo en formato PDF.');
          return;
        }

        setOverlay(true, "Analizando PDF...", "Verificando el número de hojas.");

        // Leer como ArrayBuffer para usar pdf.js
        const fileReaderBuffer = new FileReader();
        fileReaderBuffer.onload = async function() {
          const typedarray = new Uint8Array(this.result);
          try {
            // Cargar Worker de PDF.js
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

            const pdf = await pdfjsLib.getDocument(typedarray).promise;
            
            // Validación de las 5 hojas
            if (pdf.numPages > 5) {
              setOverlay(false);
              alert(`El archivo tiene ${pdf.numPages} hojas. El máximo permitido es 5.`);
              document.getElementById('pdf-file-input').value = ""; // Limpiar input
              return;
            }

            // Si pasa la validación, lo leemos como Base64 para mandarlo al socket
            const fileReaderBase64 = new FileReader();
            fileReaderBase64.onload = () => {
              enviarAlServidor(fileReaderBase64.result, true);
            };
            fileReaderBase64.readAsDataURL(file);

          } catch (err) {
            console.error(err);
            setOverlay(false);
            alert('Error al leer el PDF. Asegúrate de que no esté dañado.');
          }
        };
        fileReaderBuffer.readAsArrayBuffer(file);
      });

    } else {
      // Si no es PDF, iniciamos la cámara normal
      actualizarTextos();
      iniciarCamara();
    }

    // =============================
    // INICIAR CÁMARA Y SCANIC
    // =============================
    async function iniciarCamara() {
      try {
        const constraints = {
          audio: false,
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            advanced: [{ focusMode: "continuous" }]
          }
        };

        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        streamActual = stream;
        video.srcObject = stream;

        await new Promise((res) => {
          video.onloadedmetadata = () => res();
        });

        if (!scanicScanner) {
          try {
            const scanicModule = await import('https://unpkg.com/scanic/dist/scanic.js');
            scanicScanner = new scanicModule.Scanner();
            await scanicScanner.initialize();
          } catch (err) {
            console.error("Error al cargar Scanic:", err);
          }
        }

        titulo.innerText = "Cámara lista";
        actualizarTextos();
      } catch (err) {
        alert("Error al acceder a la cámara. Revisa permisos.");
        titulo.innerText = "Cámara bloqueada";
      }
    }

    function detenerCamara() {
      if (streamActual) {
        streamActual.getTracks().forEach(t => t.stop());
        streamActual = null;
      }
    }

    // =============================
    // CAPTURA Y AUTO-ESCANEO
    // =============================
    function capturarFrame() {
      const canvasFull = document.createElement('canvas');
      canvasFull.width = video.videoWidth;
      canvasFull.height = video.videoHeight;
      const ctx = canvasFull.getContext('2d', { willReadFrequently: false });
      ctx.filter = 'contrast(1.3) grayscale(20%)';
      ctx.drawImage(video, 0, 0, canvasFull.width, canvasFull.height);
      ctx.filter = 'none';
      return canvasFull;
    }

    function abrirVistaPrevia(dataUrl, modo = "auto") {
      autoscanDataUrl = (modo === "auto") ? dataUrl : null;
      cropArea.style.display = 'flex';
      previewImg.src = dataUrl;
      video.style.display = 'none';
      guideline.style.display = 'none';
      
      btnCapturar.classList.add('hide');
      grupoConfirmar.classList.remove('hide');

      if (modo === "auto") {
        titulo.innerText = "Documento Detectado";
        subtitulo.innerText = "Si se ve bien, confirma y envía";
      } else {
        titulo.innerText = "Ajustar Recorte";
        subtitulo.innerText = "Arrastra las esquinas si es necesario";
      }
    }

    function iniciarCropperManual(dataUrl) {
      abrirVistaPrevia(dataUrl, "manual");
      const proporcion = (tipoScan === 'identificacion') ? (85 / 54) : NaN;

      if (cropper) { cropper.destroy(); cropper = null; }
      cropper = new Cropper(previewImg, {
        aspectRatio: proporcion,
        viewMode: 1,
        dragMode: 'move',
        autoCropArea: 0.95,
        background: false,
        guides: true,
      });
    }

    async function intentarAutoScan(canvasFull) {
      try {
        if (!scanicScanner) return null;

        const img = new Image();
        const dataUrl = canvasFull.toDataURL('image/jpeg', 0.95);

        await new Promise((res, rej) => {
          img.onload = () => res();
          img.onerror = () => rej(new Error("Error imagen"));
          img.src = dataUrl;
        });

        const totalPixels = canvasFull.width * canvasFull.height;
        const options = {
          mode: 'extract',
          maxProcessingDimension: 1200,
          minArea: totalPixels * 0.20
        };

        let result = await scanicScanner.scan(img, options);

        if (result && result.success && result.output) {
          return result.output.toDataURL('image/jpeg', 0.95);
        }
        return null; 
      } catch (e) {
        return null; 
      }
    }

    async function tomarFoto() {
      setOverlay(true, "Procesando…", "Buscando bordes del documento...");
      btnCapturar.disabled = true;

      try {
        const canvasFull = capturarFrame();
        const extractedDataUrl = await intentarAutoScan(canvasFull);

        setOverlay(false);
        btnCapturar.disabled = false;

        if (extractedDataUrl) {
          abrirVistaPrevia(extractedDataUrl, "auto");
          return;
        }

        iniciarCropperManual(canvasFull.toDataURL('image/jpeg', 1.0));
      } catch (err) {
        setOverlay(false);
        btnCapturar.disabled = false;
        alert("No se pudo procesar la imagen. Intenta de nuevo.");
      }
    }

    function reintentarFoto() {
      autoscanDataUrl = null;
      if (cropper) { cropper.destroy(); cropper = null; }
      
      cropArea.style.display = 'none';
      video.style.display = 'block';
      guideline.style.display = 'flex';

      btnCapturar.classList.remove('hide');
      grupoConfirmar.classList.add('hide');
      actualizarTextos();
    }

    // =============================
    // PROCESAMIENTO FINAL Y ENVÍO
    // =============================
    function mejorarComoScanner(inputDataUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');

          ctx.filter = 'contrast(1.2) saturate(0.95) brightness(1.05)';
          ctx.drawImage(img, 0, 0);

          resolve(canvas.toDataURL('image/jpeg', 0.9));
        };
        img.src = inputDataUrl;
      });
    }

    async function confirmarFoto() {
      let imgFinal = null;

      if (autoscanDataUrl) {
        imgFinal = await mejorarComoScanner(autoscanDataUrl);
      } else {
        if (!cropper) return;
        const canvasRecorte = cropper.getCroppedCanvas({
          width: (tipoScan === 'identificacion') ? 1200 : 1600
        });
        const dataUrlManual = canvasRecorte.toDataURL('image/jpeg', 0.95);
        imgFinal = await mejorarComoScanner(dataUrlManual);
        cropper.destroy(); cropper = null;
      }

      if (tipoScan === 'documento') {
        procesarYEnviarDocumento(imgFinal);
      } else {
        if (pasoActual === 1) {
          imagenFrente = imgFinal;
          pasoActual = 2;
          reintentarFoto();
        } else {
          imagenReverso = imgFinal;
          procesarYEnviarIdentificacion();
        }
      }
    }

    function procesarYEnviarDocumento(imgBase64) {
      titulo.innerText = "Procesando...";
      subtitulo.innerText = "Generando documento estándar...";
      cropArea.style.display = 'none';
      btnCapturar.classList.add('hide');
      grupoConfirmar.classList.add('hide');

      const canvasFinal = document.createElement('canvas');
      const ctxFinal = canvasFinal.getContext('2d');
      canvasFinal.width = 1275; 
      canvasFinal.height = 1650;

      ctxFinal.fillStyle = "white";
      ctxFinal.fillRect(0, 0, canvasFinal.width, canvasFinal.height);

      const img = new Image();
      img.onload = () => {
        const ratio = Math.min((canvasFinal.width - 100) / img.width, (canvasFinal.height - 100) / img.height);
        const newWidth = img.width * ratio;
        const newHeight = img.height * ratio;
        const x = (canvasFinal.width - newWidth) / 2;
        const y = (canvasFinal.height - newHeight) / 2;

        ctxFinal.drawImage(img, x, y, newWidth, newHeight);
        enviarAlServidor(canvasFinal.toDataURL('image/jpeg', 0.85));
      };
      img.src = imgBase64;
    }

    function procesarYEnviarIdentificacion() {
      titulo.innerText = "Procesando...";
      subtitulo.innerText = "Uniendo documento en una hoja...";
      cropArea.style.display = 'none';
      btnCapturar.classList.add('hide');
      grupoConfirmar.classList.add('hide');

      const canvasFinal = document.createElement('canvas');
      const ctxFinal = canvasFinal.getContext('2d');
      canvasFinal.width = 1240; canvasFinal.height = 1754;

      ctxFinal.fillStyle = "white";
      ctxFinal.fillRect(0, 0, canvasFinal.width, canvasFinal.height);

      const img1 = new Image();
      const img2 = new Image();

      img1.onload = () => {
        ctxFinal.drawImage(img1, 100, 150, 1040, 650);
        img2.onload = () => {
          ctxFinal.drawImage(img2, 100, 900, 1040, 650);
          enviarAlServidor(canvasFinal.toDataURL('image/jpeg', 0.85));
        };
        img2.src = imagenReverso;
      };
      img1.src = imagenFrente;
    }

    function enviarAlServidor(archivoBase64, isPdf = false) {
      titulo.innerText = "¡Enviado!";
      subtitulo.innerText = "Revisa la pantalla del Kiosko.";
      setOverlay(false);

      if (!isPdf) {
        cropArea.style.display = 'flex';
        previewImg.src = archivoBase64;
      } else {
        // Interfaz de éxito para PDF en móvil
        document.getElementById('pdf-upload-container').innerHTML = `
          <i class="ph-duotone ph-check-circle" style="font-size: 80px; color: var(--primary-light); margin-bottom: 20px;"></i>
          <h3 style="margin: 0 0 10px 0;">¡PDF Enviado!</h3>
          <p style="color: var(--text-muted);">Continúa el proceso desde el Kiosko.</p>
        `;
      }

      socket.emit('enviar-documento', { sesion: idSesion, archivo: archivoBase64 });
    }

    function cerrarAppMovil() {
      detenerCamara();
      try { window.close(); } catch (_) {}
      document.body.innerHTML = '<div style="display:flex; height:100vh; align-items:center; justify-content:center; text-align:center; padding:20px;"><div><i class="ph-bold ph-check-circle" style="font-size:64px; color:var(--primary-light);"></i><h2>Proceso Terminado</h2></div></div>';
    }
  </script>
</body>
</html>
