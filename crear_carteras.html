<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Instalador de Carteras - PSD</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #1b2e45; color: white; padding: 40px; text-align: center; }
    button { background: #4da1a8; color: #1b2e45; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-bottom: 20px;}
    button:hover { background: #7ad1d6; }
    #log { background: #152336; padding: 20px; border-radius: 8px; text-align: left; height: 400px; overflow-y: auto; font-family: monospace; font-size: 14px; border: 1px solid rgba(77, 161, 168, .35); }
    .success { color: #4ade80; } .error { color: #ff7b7b; }
  </style>
</head>
<body>
  <h1>Creador Automático de Cuentas del Comité</h1>
  <p>Se crearán 35 cuentas. Contraseña por defecto: <strong>SNTSS.2026*</strong></p>
  <button id="btnStart" onclick="iniciarCreacion()">Comenzar Creación Masiva</button>
  <div id="log">Esperando para iniciar...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://axsncdwshdvsysrpikwj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4c25jZHdzaGR2c3lzcnBpa3dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAyMjkwMjQsImV4cCI6MjA3NTgwNTAyNH0.oapcH219puVjaR2DcG7dX51uhwVn530L1hhz8ASv7qs";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const carteras = [
      { email: 's.general@seccionxx.mx', name: 'Secretaría General', mat: 'COMITE-01' },
      { email: 's.interior@seccionxx.mx', name: 'Interior y Propaganda', mat: 'COMITE-02' },
      { email: 's.conflictos@seccionxx.mx', name: 'Conflictos', mat: 'COMITE-03' },
      { email: 's.trabajo@seccionxx.mx', name: 'Trabajo', mat: 'COMITE-04' },
      { email: 's.exterior@seccionxx.mx', name: 'Exterior', mat: 'COMITE-05' },
      { email: 's.tesoreria@seccionxx.mx', name: 'Tesorero', mat: 'COMITE-06' },
      { email: 's.prevision@seccionxx.mx', name: 'Previsión Social', mat: 'COMITE-07' },
      { email: 's.igualdad@seccionxx.mx', name: 'Igualdad Sustantiva', mat: 'COMITE-08' },

      { email: 's.actas@seccionxx.mx', name: 'Actas y Acuerdos', mat: 'COMITE-10' },
      { email: 's.prensa@seccionxx.mx', name: 'Prensa', mat: 'COMITE-11' },
      { email: 's.perifericos@seccionxx.mx', name: 'Puestos Periféricos', mat: 'COMITE-12' },
      { email: 's.admision@seccionxx.mx', name: 'Admisión y Cambios', mat: 'COMITE-13' },
      { email: 's.capacitacion@seccionxx.mx', name: 'Capacitación', mat: 'COMITE-14' },
      { email: 's.social@seccionxx.mx', name: 'Acción Social', mat: 'COMITE-15' },
      { email: 's.calidad@seccionxx.mx', name: 'Calidad y Modernización', mat: 'COMITE-16' },
      { email: 'c.honor@seccionxx.mx', name: 'Comisión de Honor y Justicia', mat: 'COMITE-17' },
      { email: 'c.hacienda@seccionxx.mx', name: 'Comisión de Hacienda', mat: 'COMITE-18' },
      { email: 'c.vigilancia@seccionxx.mx', name: 'Comisión de Vigilancia', mat: 'COMITE-19' },
      { email: 'c.deportes@seccionxx.mx', name: 'Comisión de Deportes', mat: 'COMITE-20' },
      { email: 'c.fomento@seccionxx.mx', name: 'Fomento de la Seguridad Social', mat: 'COMITE-21' },
      { email: 'c.politica@seccionxx.mx', name: 'Acción Política', mat: 'COMITE-22' },
      { email: 'sub.becas@seccionxx.mx', name: 'Subcomisión de Becas', mat: 'COMITE-23' },
      { email: 'sub.bolsa@seccionxx.mx', name: 'Bolsa de Trabajo', mat: 'COMITE-24' },
      { email: 'sub.confianzas@seccionxx.mx', name: 'Confianzas "B"', mat: 'COMITE-25' },
      { email: 'sub.capacitacion@seccionxx.mx', name: 'Subcomisión de Capacitación', mat: 'COMITE-26' },
      { email: 'sub.seguridad@seccionxx.mx', name: 'Seguridad e Higiene', mat: 'COMITE-27' },
      { email: 'sub.disciplinaria@seccionxx.mx', name: 'Disciplinaria', mat: 'COMITE-28' },
      { email: 'sub.escalafon@seccionxx.mx', name: 'Escalafón', mat: 'COMITE-29' },
      { email: 'sub.paritaria@seccionxx.mx', name: 'Paritaria', mat: 'COMITE-30' },
      { email: 'sub.pasajes@seccionxx.mx', name: 'Pasajes', mat: 'COMITE-31' },
      { email: 'sub.ropa@seccionxx.mx', name: 'Ropa de Trabajo', mat: 'COMITE-32' },
      { email: 'sub.cambiosrama@seccionxx.mx', name: 'Cambios de Rama', mat: 'COMITE-33' },
      { email: 'sub.tiendas@seccionxx.mx', name: 'Tiendas', mat: 'COMITE-34' },
      { email: 'sub.plantillas@seccionxx.mx', name: 'Revisión de Plantillas', mat: 'COMITE-35' }
    ];

    const pass = "SNTSS.2026*";
    const delay = ms => new Promise(res => setTimeout(res, ms));
    const logEl = document.getElementById('log');

    function logMsg(msg, type = '') {
      logEl.innerHTML += `<div class="${type}">${msg}</div>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function iniciarCreacion() {
      document.getElementById('btnStart').disabled = true;
      logMsg("Iniciando creación de cuentas...");

      for (let i = 0; i < carteras.length; i++) {
        const c = carteras[i];
        try {
          const { data, error } = await supabase.auth.signUp({
            email: c.email,
            password: pass,
            options: { data: { display_name: c.name, matricula: c.mat, role: 'admin' } }
          });

          if (error) throw error;

          if (data.user) {
            await supabase.from('profiles').upsert({
              user_id: data.user.id,
              display_name: c.name,
              matricula: c.mat,
              role: 'admin',
              categoria: 'Comité Ejecutivo Seccional'
            }, { onConflict: 'user_id' });
          }

          logMsg(`[${i+1}/${carteras.length}] ✅ Creada: ${c.name}`, 'success');
        } catch (e) {
          logMsg(`[${i+1}/${carteras.length}] ❌ Error en ${c.name}: ${e.message}`, 'error');
        }
        await delay(1000);
      }
      logMsg("🎉 PROCESO TERMINADO. Ya puedes borrar este archivo.", 'success');
      await supabase.auth.signOut();
    }
  </script>
</body>
</html>
