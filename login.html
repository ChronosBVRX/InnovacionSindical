<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plataforma Comunitaria CG — Acceso</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<style>
  :root{
    /* ✅ Paleta oficial — Plataforma Comunitaria CG */
    --bg:#1b2e45;          /* body */
    --bg2:#152336;         /* degradado */
    --panel:#2e4f77;       /* cards */
    --ring:rgba(77,161,168,.35); /* bordes/anillos */
    --txt:#f0fdfa;         /* texto principal */
    --muted:#bce9eb;       /* texto secundario */
    --accent:#4da1a8;      /* primary */
    --sky:#7ad1d6;         /* sky */
    --err:#ff7b7b;
  }

  *{box-sizing:border-box}

  html,body{
    height:100%; margin:0; color:var(--txt);
    font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
    background:
      radial-gradient(70vmax 70vmax at 50% 20%, rgba(77,161,168,.18), transparent 60%),
      radial-gradient(60vmax 60vmax at 80% 80%, rgba(122,209,214,.12), transparent 60%),
      linear-gradient(180deg,var(--bg2),var(--bg));
  }

  .wrap{max-width:980px;margin:0 auto;padding:22px}

  .card{
    background:linear-gradient(180deg, rgba(46,79,119,.92), rgba(27,46,69,.92));
    border:1px solid var(--ring);
    border-radius:16px;
    padding:16px;
    box-shadow:0 10px 40px rgba(0,0,0,.45);
    backdrop-filter: blur(6px);
  }

  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;min-width:240px}
  .brand img{
    width:42px;height:42px;border-radius:12px;
    border:1px solid var(--ring);
    background:rgba(21,35,54,.9);
    object-fit:contain;
  }

  h1{margin:0;font-size:18px;color:var(--txt)}
  .muted{color:var(--muted)}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

  .tabs{display:flex;gap:8px;margin:8px 0 12px;flex-wrap:wrap}
  .tab{
    appearance:none;
    border:1px solid var(--ring);
    background:rgba(77,161,168,.12);
    color:var(--txt);
    border-radius:12px;
    padding:8px 12px;
    cursor:pointer;
  }
  .tab.active{
    background:linear-gradient(90deg,var(--accent),var(--sky));
    border:none;
    color:#0b2230;
    font-weight:700;
  }

  label{display:block;font-size:12px;color:var(--muted);margin:6px 0 4px}

  input,select{
    width:100%;
    padding:10px 12px;
    border-radius:12px;
    border:1px solid var(--ring);
    background:rgba(21,35,54,.85);
    color:var(--txt);
    outline:none;
  }
  input:focus, select:focus{
    border-color: rgba(122,209,214,.65);
    box-shadow: 0 0 0 4px rgba(77,161,168,.18);
  }

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid-1{grid-column:1/-1}
  @media(max-width:760px){ .grid{grid-template-columns:1fr} }

  .btn{
    appearance:none;
    border:1px solid var(--ring);
    background:rgba(77,161,168,.12);
    color:var(--txt);
    border-radius:12px;
    padding:10px 14px;
    font-size:14px;
    cursor:pointer;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .btn:hover{filter:brightness(1.05)}
  .btn.primary{
    background:linear-gradient(90deg,var(--accent),var(--sky));
    border:none;
    color:#0b2230;
    font-weight:800;
  }

  .error{color:var(--err);font-size:13px;margin-top:8px}
  .hint{font-size:12px;color:rgba(188,233,235,.92)}

  .link-sm{
    font-size:12px;
    color:var(--muted);
    text-decoration:underline;
    cursor:pointer;
  }
  .link-sm:hover{color:var(--txt)}

  hr.sep{border:none;border-top:1px solid var(--ring)}

  /* 🔎 Combo autocompletable (Categoría) */
  .combo{ position:relative; }
  .combo-list{
    position:absolute;
    top:calc(100% + 6px);
    left:0; right:0;
    z-index:50;
    background:rgba(21,35,54,.98);
    border:1px solid var(--ring);
    border-radius:12px;
    box-shadow:0 10px 40px rgba(0,0,0,.45);
    max-height:260px;
    overflow:auto;
    padding:6px;
    display:none;
  }
  .combo-item{
    padding:10px 10px;
    border-radius:10px;
    cursor:pointer;
    color:var(--txt);
  }
  .combo-item:hover,
  .combo-item.active{
    background:rgba(77,161,168,.18);
    outline:1px solid rgba(77,161,168,.25);
  }
  .combo-empty{
    padding:10px 10px;
    color:var(--muted);
    font-size:12px;
  }
</style>
</head>

    const catInput = document.getElementById('suCategoria');
    const catList  = document.getElementById('catList');

    let catOpen = false;
    let catActiveIndex = -1;
    let catResults = [];
    let categoriaSeleccionada = false;

    const norm = (s)=> (s||"")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g,"");

    function closeCat(){
      catList.style.display = 'none';
      catInput.setAttribute('aria-expanded','false');
      catOpen = false;
      catActiveIndex = -1;
    }

    function openCat(){
      if (!catResults.length){
        closeCat();
        return;
      }
      catList.style.display = 'block';
      catInput.setAttribute('aria-expanded','true');
      catOpen = true;
    }

    function highlightCat(idx){
      const nodes = [...catList.querySelectorAll('.combo-item')];
      nodes.forEach(n=>n.classList.remove('active'));
      catActiveIndex = idx;

      if (idx >= 0 && nodes[idx]){
        nodes[idx].classList.add('active');
        nodes[idx].scrollIntoView({block:'nearest'});
      }
    }

    function selectCat(idx){
      const chosen = catResults[idx];
      if (!chosen) return;
      catInput.value = chosen;
      categoriaSeleccionada = true; // ✅ SOLO aquí se vuelve válida
      closeCat();
    }

    function renderCat(items){
      catList.innerHTML = '';

      if (!items.length){
        catList.innerHTML = `<div class="combo-empty">Sin coincidencias</div>`;
        openCat();
        return;
      }

      items.slice(0, 30).forEach((txt, idx)=>{
        const div = document.createElement('div');
        div.className = 'combo-item';
        div.textContent = txt;
        div.setAttribute('role','option');
        div.addEventListener('mousedown', (e)=>{
          e.preventDefault(); // evita blur antes de seleccionar
          selectCat(idx);
        });
        catList.appendChild(div);
      });

      openCat();
      highlightCat(-1);
    }

    function filterCat(){
      const q = norm(catInput.value.trim());
      if (q.length < 2){
        catResults = [];
        closeCat();
        return;
      }
      catResults = CATEGORIAS.filter(c => norm(c).includes(q));
      renderCat(catResults);
    }

    catInput.addEventListener('input', filterCat);
    catInput.addEventListener('input', ()=>{ categoriaSeleccionada = false; }); // escribir NO cuenta como seleccionar
    catInput.addEventListener('focus', filterCat);
    catInput.addEventListener('blur', ()=>{
      if (!categoriaSeleccionada) catInput.value = '';
      setTimeout(closeCat, 120);
    });

    catInput.addEventListener('keydown', (e)=>{
      const nodes = [...catList.querySelectorAll('.combo-item')];

      if (!catOpen && (e.key === 'ArrowDown' || e.key === 'ArrowUp')){
        filterCat();
        return;
      }
      if (!catOpen) return;

      if (e.key === 'ArrowDown'){
        e.preventDefault();
        const next = Math.min(nodes.length - 1, catActiveIndex + 1);
        highlightCat(next);
      } else if (e.key === 'ArrowUp'){
        e.preventDefault();
        const prev = Math.max(0, catActiveIndex - 1);
        highlightCat(prev);
      } else if (e.key === 'Enter'){
        if (catActiveIndex >= 0){
          e.preventDefault();
          selectCat(catActiveIndex);
        }
      } else if (e.key === 'Escape'){
        closeCat();
      }
    });

    document.addEventListener('click', (e)=>{
      if (!catList.contains(e.target) && e.target !== catInput) closeCat();
    });

    /* LOGIN (por matrícula) */
    fLogin.addEventListener('submit', async (e)=>{
      e.preventDefault();
      liErr.textContent = '';

      const matricula = ($('#liUser').value || '').trim();
      const password = $('#liPass').value;

      if (!matricula || !password){
        liErr.textContent = 'Escribe tu matrícula y contraseña.';
        return;
      }

      // Validación simple (ajústala si tu matrícula tiene otro formato)
      if (!/^[0-9]{4,12}$/.test(matricula)){
        liErr.textContent = 'La matrícula debe contener solo números (4 a 12 dígitos).';
        return;
      }

      // Resolver email por matrícula usando RPC en Supabase
      const { data: email, error: rpcErr } = await supabase.rpc('get_email_by_matricula', {
        p_matricula: matricula
      });

      if (rpcErr){
        liErr.textContent = 'No se pudo validar la matrícula. Intenta de nuevo.';
        return;
      }

      if (!email){
        liErr.textContent = 'Matrícula no encontrada. Si ya tienes cuenta, entra por correo o registra tu matrícula en tu perfil.';
        return;
      }

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error){
        liErr.textContent = 'Error: ' + (error.message || 'No se pudo iniciar sesión');
        return;
      }

      location.href = REDIRECT_AFTER_LOGIN;
    });

    /* OLVIDÉ CONTRASEÑA (pide correo porque Supabase envía al email) */
    forgotPass.addEventListener('click', async ()=>{
      liErr.textContent = '';

      let email = prompt("Escribe el correo con el que te registraste (para enviarte el enlace):");
      if (!email) return;
      email = email.trim();

      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: RESET_PASSWORD_REDIRECT
      });

      if (error){
        liErr.textContent = "No se pudo enviar el correo: " + (error.message || "");
        return;
      }

      alert("Te enviamos un correo con instrucciones para restablecer tu contraseña.");
    });

    /* SIGNUP */
    fSignup.addEventListener('submit', async (e)=>{
      e.preventDefault();
      suErr.textContent = '';

      // ✅ Perfil
      const display_name = $('#suName').value.trim();
      const matricula    = ($('#suMatricula').value || '').trim();

      // ✅ INTEGRADO: variables EXACTAS como pediste
      const telefono     = $('#suPhone').value.trim();
      const cumple       = $('#suBirth').value; // yyyy-mm-dd
      const categoria    = $('#suCategoria').value.trim();
      const adscripcion  = $('#suAdscripcion').value;

      // ✅ Auth
      const email        = $('#suEmail').value.trim();
      const password     = $('#suPass').value;

      if (!display_name || !matricula || !telefono || !cumple || !categoria || !adscripcion || !email || !password){
        suErr.textContent = 'Completa todos los campos.';
        return;
      }

      if (!/^[0-9]{4,12}$/.test(matricula)){
        suErr.textContent = 'La matrícula debe contener solo números (4 a 12 dígitos).';
        $('#suMatricula').focus();
        return;
      }

      // ✅ Validación: obliga a elegir de la lista
      if (!categoriaSeleccionada){
        suErr.textContent = "Debes seleccionar una categoría de la lista desplegable.";
        catInput.focus();
        return;
      }

      // ✅ INTEGRADO: signUp con metadata EXACTA como pediste
      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: { display_name, telefono, cumple, categoria, adscripcion }
        }
      });

      if (error){
        suErr.textContent = 'Error: ' + (error.message || 'No se pudo crear la cuenta');
        return;
      }

      // Guardar datos en profiles
      const userId = data?.user?.id;
      if (userId){
        const { error: upErr } = await supabase
          .from('profiles')
          .update({
            display_name,
            categoria,
            adscripcion,
            telefono,
            cumple,
            matricula
          })
          .eq('user_id', userId);

        if (upErr){
          const msg = (upErr.message || '').toLowerCase();
          if (msg.includes('duplicate') || msg.includes('unique')){
            suErr.textContent = "Esa matrícula ya está registrada. Si es tu cuenta, intenta recuperar tu contraseña.";
          } else {
            suErr.textContent = "Cuenta creada, pero no se pudo guardar el perfil: " + (upErr.message || "");
          }
          return;
        }
      }

      alert('¡Cuenta creada! Revisa tu correo para confirmar la dirección. Luego inicia sesión.');
      showLogin();
      $('#liUser').value = matricula;
    });

  })();
  </script>
</body>
</html>
